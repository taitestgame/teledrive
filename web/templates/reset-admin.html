<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TeleCloud - Reset Admin Password</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/favicon.png">
    <link rel="apple-touch-icon" href="/static/favicon.png">

    <link rel="stylesheet" href="/static/css/tailwind.css?v={{ .version }}">

    <link rel="stylesheet" href="/static/css/style.min.css?v={{ .version }}">

    <script>window.TELECLOUD_VERSION = '{{ .version }}';</script>
    <script src="/static/js/common.min.js?v={{ .version }}"></script>
    <script>TeleCloud.version = '{{ .version }}';</script>
    <script type="module" src="/static/js/script.min.js?v={{ .version }}"></script>

</head>

<body
    class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 h-full relative overflow-hidden flex flex-col transition-colors duration-500"
    data-theme="system"
    x-data="cloudApp(false, 'system', 0, 0, false)">
    <div class="blob-1"></div>
    <div class="blob-2"></div>

    <div x-show="toastModal.show" x-cloak
        class="fixed inset-0 z-[300] flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4"
        x-transition.opacity>
        <div @click.outside="if(!toastModal.persistent) toastModal.show = false"
            class="glass-menu w-full max-w-sm rounded-[2rem] p-6 shadow-2xl animate-modal-in border border-white/20 relative flex flex-col items-center text-center">

            <div class="w-16 h-16 rounded-full flex items-center justify-center mb-4 shadow-inner"
                :class="toastModal.type === 'error' ? 'bg-red-100 text-red-500 dark:bg-red-500/20' : 'bg-emerald-100 text-emerald-500 dark:bg-emerald-500/20'">
                <i class="fa-solid text-3xl" :class="toastModal.type === 'error' ? 'fa-xmark' : 'fa-check'"></i>
            </div>

            <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2"
                x-text="toastModal.type === 'error' ? t('failure') : t('success')"></h3>
            <p class="text-slate-600 dark:text-slate-300 text-sm mb-2" x-text="toastModal.message"></p>

            <button x-show="!toastModal.persistent" @click="toastModal.show = false"
                class="mt-4 w-full py-3 rounded-xl text-white font-medium shadow-lg transition-transform active:scale-95"
                :class="toastModal.type === 'error' ? 'bg-red-600 hover:bg-red-500 shadow-red-500/25' : 'bg-blue-600 hover:bg-blue-500 shadow-blue-500/25'"
                x-text="t('close')">
            </button>
        </div>
    </div>

    <div class="w-full h-[100dvh] flex flex-col items-center justify-center p-4 z-10">
        <div class="glass-panel p-8 md:p-10 rounded-[2rem] w-full max-w-md relative">
            <!-- Language Dropdown -->
            <div class="absolute top-4 right-4 z-[110]" x-data="{ open: false }">
                <button @click="open = !open" @click.outside="open = false"
                    class="h-8 px-2 flex items-center gap-1.5 text-slate-500 hover:text-blue-500 bg-white/50 dark:bg-slate-800/50 rounded-lg transition-colors border border-slate-200 dark:border-slate-700/50">
                    <i class="fa-solid fa-earth-americas text-xs"></i>
                    <span class="text-[10px] font-bold uppercase" x-text="lang"></span>
                </button>
                <div x-show="open" x-cloak
                    class="absolute top-10 right-0 w-32 glass-menu rounded-xl shadow-xl border border-white/20 p-1 z-[1000]"
                    x-transition:enter="transition ease-out duration-100"
                    x-transition:enter-start="transform opacity-0 scale-95"
                    x-transition:enter-end="transform opacity-100 scale-100">
                    <template x-for="l in TeleCloud.availableLangs" :key="l.code">
                        <button @click="setLang(l.code); open = false"
                            class="w-full text-left px-3 py-2 rounded-lg text-xs font-medium transition-colors flex items-center justify-between"
                            :class="lang === l.code ? 'bg-blue-600 text-white shadow-md' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800'">
                            <span x-text="l.name"></span>
                            <span x-text="l.flag"></span>
                        </button>
                    </template>
                </div>
            </div>
            <div class="text-center mb-8">
                <div
                    class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl mx-auto flex items-center justify-center shadow-lg shadow-blue-500/30 mb-4">
                    <i class="fa-solid fa-key text-3xl text-white"></i>
                </div>
                <h2 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white" x-text="t('reset_admin_title')">Reset Admin</h2>
                <p class="text-sm text-slate-500 mt-2" x-text="t('reset_admin_desc')">Set a new password for your admin account</p>
            </div>
            <form @submit.prevent="resetAdmin">
                <input type="password" autocomplete="new-password" x-model="password"
                    :placeholder="t('new_password')" required
                    class="w-full p-4 rounded-xl bg-white/50 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700/50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-900 dark:text-white mb-4 backdrop-blur-sm transition-all">
                <input type="password" autocomplete="new-password" x-model="confirmPassword"
                    :placeholder="t('setup_confirm_password')" required
                    class="w-full p-4 rounded-xl bg-white/50 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700/50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-900 dark:text-white mb-6 backdrop-blur-sm transition-all">
                <button type="submit"
                    class="w-full py-4 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-semibold transition-all shadow-lg active:scale-[0.98]"
                    x-text="t('confirm')"></button>
            </form>
        </div>
    </div>
</body>

</html>
