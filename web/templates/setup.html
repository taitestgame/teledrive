<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TeleCloud - Setup Wizard</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/static/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="/static/css/tailwind.css?v={{ .version }}">

    <link rel="stylesheet" href="/static/css/style.min.css?v={{ .version }}">

    <script>window.TELECLOUD_VERSION = '{{ .version }}';</script>
    <script src="/static/js/common.min.js?v={{ .version }}"></script>
    <script>TeleCloud.version = '{{ .version }}';</script>
    <script type="module" src="/static/js/script.min.js?v={{ .version }}"></script>


    <script>
        // Set initial theme to avoid flash
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>

<body
    class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 min-h-screen relative flex flex-col transition-colors duration-500"
    data-theme="system"
    x-data="setupWizard('{{ .api_id }}', '{{ .api_hash }}', {{ .has_default_api }}, '{{ .log_group_id }}', {{ .admin_exists }})">

    <!-- Loading overlay before translations are loaded -->
    <div x-show="!translationsLoaded" x-transition:leave="transition ease-in duration-500"
        x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
        class="fixed inset-0 bg-slate-50 dark:bg-slate-950 flex flex-col items-center justify-center z-[9999]">
        <div class="relative mb-8 animate-pulse-soft">
            <div class="w-20 h-20 bg-gradient-to-br from-blue-500 to-purple-600 rounded-[1.5rem] flex items-center justify-center shadow-2xl shadow-blue-500/40 rotate-12">
                <i class="fa-solid fa-cloud text-3xl text-white -rotate-12"></i>
            </div>
            <div class="absolute -inset-4 bg-blue-500/20 blur-2xl rounded-full -z-10 animate-pulse"></div>
        </div>
        <div class="loader-bar mb-4"></div>
        <p class="text-slate-400 dark:text-slate-500 font-medium text-sm tracking-wider uppercase opacity-80">Initializing TeleCloud</p>
    </div>

    <!-- Main content hidden until translations load -->
    <div x-show="translationsLoaded" x-cloak
        x-transition:enter="transition ease-out duration-700 delay-300"
        x-transition:enter-start="opacity-0 translate-y-4"
        x-transition:enter-end="opacity-100 translate-y-0"
        class="flex-1 w-full min-h-screen flex flex-col items-center justify-center relative">
        <div class="blob-1"></div>
        <div class="blob-2"></div>

        <!-- Language Switcher -->
        <div class="fixed top-6 right-6 z-[200]">
            <div class="relative" x-data="{ open: false }">
                <button @click="open = !open"
                    class="glass-menu px-4 py-2 rounded-full flex items-center gap-2 text-sm font-medium hover:scale-105 transition-transform shadow-lg border border-white/20">
                    <span x-text="TeleCloud.availableLangs.find(l => l.code === lang)?.flag"></span>
                    <span x-text="TeleCloud.availableLangs.find(l => l.code === lang)?.name"></span>
                    <i class="fa-solid fa-chevron-down text-xs transition-transform"
                        :class="open ? 'rotate-180' : ''"></i>
                </button>
                <div x-show="open" @click.outside="open = false" x-transition
                    class="absolute right-0 mt-2 w-48 glass-menu rounded-2xl p-2 shadow-2xl border border-white/20 overflow-hidden">
                    <template x-for="l in TeleCloud.availableLangs" :key="l.code">
                        <button @click="setLang(l.code); open = false"
                            class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/10 transition-colors text-sm"
                            :class="lang === l.code ? 'text-blue-500 font-bold' : ''">
                            <span x-text="l.flag"></span>
                            <span x-text="l.name"></span>
                            <i x-show="lang === l.code" class="fa-solid fa-check ml-auto text-xs"></i>
                        </button>
                    </template>
                </div>
            </div>
        </div>

        <div x-show="toastModal.show" x-cloak
            class="fixed inset-0 z-[300] flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4"
            x-transition.opacity>
            <div @click.outside="if(!toastModal.persistent) toastModal.show = false"
                class="glass-menu w-full max-w-sm rounded-[2rem] p-6 shadow-2xl animate-modal-in border border-white/20 relative flex flex-col items-center text-center">

                <div class="w-16 h-16 rounded-full flex items-center justify-center mb-4 shadow-inner"
                    :class="toastModal.type === 'error' ? 'bg-red-100 text-red-500 dark:bg-red-500/20' : 'bg-emerald-100 text-emerald-500 dark:bg-emerald-500/20'">
                    <i class="fa-solid text-3xl" :class="toastModal.type === 'error' ? 'fa-xmark' : 'fa-check'"></i>
                </div>

                <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2"
                    x-text="toastModal.type === 'error' ? t('setup_error') : t('setup_success')"></h3>
                <p class="text-slate-600 dark:text-slate-300 text-sm mb-2" x-text="toastModal.message"></p>

                <button x-show="!toastModal.persistent" @click="toastModal.show = false"
                    class="mt-4 w-full py-3 rounded-xl text-white font-medium shadow-lg transition-transform active:scale-95"
                    :class="toastModal.type === 'error' ? 'bg-red-600 hover:bg-red-500 shadow-red-500/25' : 'bg-blue-600 hover:bg-blue-500 shadow-blue-500/25'">
                    <span x-text="t('close')"></span>
                </button>
            </div>
        </div>

        <div class="w-full min-h-[100dvh] flex flex-col items-center justify-center p-4 z-10 py-12">
            <div class="glass-panel p-8 md:p-10 rounded-[2rem] w-full max-w-md relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1.5 bg-slate-200 dark:bg-slate-800">
                    <div class="h-full bg-blue-500 transition-all duration-500 ease-out"
                        :style="'width: ' + (Math.min(step / 5, 1) * 100) + '%'"></div>
                </div>

                <div class="text-center mb-8 mt-2">
                    <div
                        class="w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl mx-auto flex items-center justify-center shadow-lg shadow-blue-500/30 mb-4 transition-transform hover:scale-105 duration-300">
                        <i class="fa-solid text-3xl text-white" :class="getStepIcon()"></i>
                    </div>
                    <h2 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white"
                        x-text="getStepTitle()">Setup</h2>
                    <p class="text-sm text-slate-500 mt-2"
                        x-text="admin_exists ? t('setup_reauth_required') : getStepDesc()"></p>
                </div>

                <!-- Step 1: API Config -->
                <form x-show="step === 1" 
                    x-transition:enter="transition ease-out duration-500"
                    x-transition:enter-start="opacity-0 translate-y-4"
                    x-transition:enter-end="opacity-100 translate-y-0"
                    @submit.prevent="submitApiConfig" x-cloak>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2"
                                x-text="t('setup_api_id')"></label>
                            <input type="number" x-model="api_id" required placeholder="123456"
                                class="w-full p-4 rounded-xl bg-white/50 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700/50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-900 dark:text-white backdrop-blur-sm transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2"
                                x-text="t('setup_api_hash')"></label>
                            <input type="text" x-model="api_hash" required
                                placeholder="abcdef1234567890abcdef1234567890"
                                class="w-full p-4 rounded-xl bg-white/50 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700/50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-900 dark:text-white backdrop-blur-sm transition-all">
                        </div>
                    </div>
                    <button type="submit" :disabled="loading"
                        class="mt-8 w-full py-4 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-semibold transition-all shadow-lg active:scale-[0.98] flex justify-center items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fa-solid fa-spinner fa-spin" x-show="loading"></i>
                        <span x-text="loading ? t('setup_saving') : t('setup_next')"></span>
                    </button>
                </form>

                <!-- Step 2: Telegram Auth -->
                <div x-show="step === 2" 
                    x-transition:enter="transition ease-out duration-500"
                    x-transition:enter-start="opacity-0 translate-y-4"
                    x-transition:enter-end="opacity-100 translate-y-0"
                    x-cloak>
                    <div x-show="authStep === 'phone' || authStep === 'qr'"
                        class="flex gap-2 p-1 bg-slate-100 dark:bg-slate-900/60 rounded-xl mb-6">
                        <button @click="authStep === 'qr' ? cancelAuthFlow() : authStep = 'phone'" :disabled="loading && authStep !== 'qr'"
                            class="flex-1 py-2 text-sm font-medium rounded-lg transition-all flex items-center justify-center gap-1 disabled:opacity-50 cursor-pointer"
                            :class="authStep === 'phone' ? 'bg-white dark:bg-slate-800 shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'">
                            <i class="fa-solid fa-phone"></i> <span x-text="t('setup_login_phone')"></span>
                        </button>
                        <button @click="startQRLogin()" :disabled="loading"
                            class="flex-1 py-2 text-sm font-medium rounded-lg transition-all flex items-center justify-center gap-1 disabled:opacity-50 cursor-pointer"
                            :class="authStep === 'qr' ? 'bg-white dark:bg-slate-800 shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'">
                            <i class="fa-solid fa-qrcode"></i> <span x-text="t('setup_login_qr')"></span>
                        </button>
                    </div>

                    <!-- Phone -->
                    <form x-show="authStep === 'phone'" @submit.prevent="submitPhone" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2"
                                x-text="t('setup_login_phone')"></label>
                            <input type="text" x-model="phone" placeholder="+84912345678" required
                                @input="if(phone.length > 0 && !phone.startsWith('+')) phone = '+' + phone.replace(/[^0-9]/g, ''); else if(phone.length > 1) phone = '+' + phone.substring(1).replace(/[^0-9]/g, '')"
                                class="w-full p-4 rounded-xl bg-white/50 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700/50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-900 dark:text-white backdrop-blur-sm transition-all font-mono text-lg">
                        </div>
                        <button type="submit" :disabled="loading"
                            class="w-full py-4 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-semibold transition-all shadow-lg active:scale-[0.98] flex justify-center items-center gap-2 disabled:opacity-50">
                            <i class="fa-solid fa-spinner fa-spin" x-show="loading"></i>
                            <span x-text="loading ? t('setup_sending') : t('setup_send_otp')"></span>
                        </button>
                    </form>

                    <!-- Code -->
                    <form x-show="authStep === 'code'" @submit.prevent="submitCode" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2"
                                x-text="t('setup_login_code')"></label>
                            <input type="text" x-model="code" placeholder="12345" required
                                class="w-full p-4 rounded-xl bg-white/50 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700/50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-900 dark:text-white backdrop-blur-sm transition-all font-mono tracking-widest text-center text-lg">
                        </div>
                        <button type="submit" :disabled="loading"
                            class="w-full py-4 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-semibold transition-all shadow-lg active:scale-[0.98] flex justify-center items-center gap-2 disabled:opacity-50">
                            <i class="fa-solid fa-spinner fa-spin" x-show="loading"></i>
                            <span x-text="loading ? t('setup_verifying') : t('setup_verify_otp')"></span>
                        </button>
                        <button type="button" @click="cancelAuthFlow()"
                            class="w-full py-4 rounded-xl bg-slate-200 hover:bg-slate-300 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-semibold transition-all shadow-md active:scale-[0.98] mt-3"
                            x-text="t('setup_back_phone')"></button>
                    </form>

                    <!-- Password -->
                    <form x-show="authStep === 'password'" @submit.prevent="submitPassword" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2"
                                x-text="t('setup_2fa_password')"></label>
                            <input type="password" x-model="password" required placeholder="••••••••"
                                class="w-full p-4 rounded-xl bg-white/50 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700/50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-900 dark:text-white backdrop-blur-sm transition-all">
                        </div>
                        <button type="submit" :disabled="loading"
                            class="w-full py-4 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-semibold transition-all shadow-lg active:scale-[0.98] flex justify-center items-center gap-2 disabled:opacity-50">
                            <i class="fa-solid fa-spinner fa-spin" x-show="loading"></i>
                            <span x-text="loading ? t('setup_logging_in') : t('setup_login')"></span>
                        </button>
                    </form>

                    <!-- QR -->
                    <div x-show="authStep === 'qr'" class="space-y-6 text-center py-4" x-transition.opacity>
                        <div
                            class="relative inline-block p-4 bg-white rounded-[2rem] shadow-2xl border border-slate-100 mx-auto">
                            <template x-if="qr_url">
                                <div class="space-y-4">
                                    <img :src="'/api/setup/tg/qr/image?t=' + qr_timestamp"
                                        class="w-56 h-56 mx-auto rounded-xl" />

                                    <div class="flex items-center justify-center gap-2 text-xs font-semibold">
                                        <div
                                            class="flex items-center gap-1.5 px-3 py-1.5 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 rounded-full">
                                            <i class="fa-solid fa-rotate-right"
                                                :class="qr_countdown <= 3 ? 'fa-spin' : ''"></i>
                                            <span
                                                x-text="qr_countdown > 0 ? t('setup_qr_refresh_in').replace('{s}', qr_countdown) : t('setup_refreshing')"></span>
                                        </div>
                                    </div>
                                </div>
                            </template>
                            <template x-if="!qr_url">
                                <div
                                    class="w-56 h-56 flex items-center justify-center bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200">
                                    <i class="fa-solid fa-spinner fa-spin text-3xl text-blue-500"></i>
                                </div>
                            </template>
                        </div>
                        <div class="space-y-2">
                            <p class="text-sm font-medium text-slate-900 dark:text-white"
                                x-text="t('setup_scan_qr_title')"></p>
                            <p class="text-xs text-slate-500 px-8" x-text="t('setup_scan_qr_desc')"></p>
                        </div>
                        <div class="px-8 pt-2">
                            <button type="button" @click="cancelAuthFlow()" :disabled="loading"
                                class="w-full py-3.5 rounded-xl bg-slate-200 hover:bg-slate-300 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 font-semibold transition-all shadow-md active:scale-[0.98] disabled:opacity-50 cursor-pointer"
                                x-text="t('setup_back_phone') || 'Quay lại'"></button>
                        </div>
                    </div>

                    <!-- Collapsible Advanced API Settings -->
                    <div x-show="authStep === 'phone' || authStep === 'qr'" class="mt-6 pt-4 border-t border-slate-200/60 dark:border-slate-800/60">
                        <button type="button" @click="showAdvanced = !showAdvanced" 
                            class="flex items-center justify-between w-full py-2.5 px-3 rounded-xl hover:bg-slate-100/50 dark:hover:bg-slate-900/30 text-xs font-bold text-slate-500 hover:text-slate-800 dark:text-slate-400 dark:hover:text-slate-200 transition-all select-none border border-transparent hover:border-slate-200/40 dark:hover:border-slate-800/40">
                            <span class="flex items-center gap-2">
                                <i class="fa-solid fa-gears text-sm transition-transform duration-500" :class="showAdvanced ? 'rotate-90 text-blue-500' : ''"></i>
                                <span x-text="t('setup_advanced_settings')">Cài đặt nâng cao</span>
                            </span>
                            <span class="flex items-center gap-2">
                                <!-- Status Badge in Header -->
                                <span class="text-[9px] uppercase tracking-wider px-2 py-0.5 rounded-full border transition-all"
                                    :class="!api_id ? 'bg-emerald-500/5 border-emerald-500/20 text-emerald-600 dark:text-emerald-400' : 'bg-purple-500/5 border-purple-500/20 text-purple-600 dark:text-purple-400'"
                                    x-text="!api_id ? 'Default' : 'Custom'"></span>
                                <i class="fa-solid fa-chevron-down text-[10px] transition-transform duration-300" :class="showAdvanced ? 'rotate-180' : ''"></i>
                            </span>
                        </button>
                        
                        <div x-show="showAdvanced" x-collapse x-transition.duration.300ms class="mt-3" x-cloak>
                            <div class="space-y-4 p-4 rounded-2xl bg-white/30 dark:bg-slate-950/20 border border-slate-200/50 dark:border-slate-800/50 backdrop-blur-md shadow-sm">
                                
                                <!-- Active Status Indicator Badge (Dynamic & Pulsing) -->
                                <div class="flex items-center justify-between p-3 rounded-xl border transition-all"
                                    :class="!api_id ? 'bg-emerald-500/5 border-emerald-500/10 text-emerald-600 dark:text-emerald-400' : 'bg-purple-500/5 border-purple-500/10 text-purple-600 dark:text-purple-400'">
                                    <div class="flex items-center gap-2.5 text-[11px] font-semibold">
                                        <span class="relative flex h-2 w-2">
                                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75"
                                                :class="!api_id ? 'bg-emerald-500' : 'bg-purple-500'"></span>
                                            <span class="relative inline-flex rounded-full h-2 w-2"
                                                :class="!api_id ? 'bg-emerald-500' : 'bg-purple-500'"></span>
                                        </span>
                                        <span x-text="!api_id ? (t('setup_api_status_default') || 'Đang dùng API mặc định hệ thống') : (t('setup_api_status_custom') || 'Đang dùng API cá nhân tự cấu hình')"></span>
                                    </div>
                                    <i :class="!api_id ? 'fa-solid fa-cloud-bolt text-xs opacity-70' : 'fa-solid fa-user-shield text-xs opacity-70'"></i>
                                </div>

                                <!-- Info Banner -->
                                <div class="p-3.5 rounded-xl bg-blue-500/5 dark:bg-blue-500/5 border border-blue-500/10 text-[11px] text-slate-600 dark:text-slate-400 leading-relaxed space-y-1.5">
                                    <div class="font-bold flex items-center gap-1.5 text-blue-600 dark:text-blue-400">
                                        <i class="fa-solid fa-circle-info text-sm"></i>
                                        <span x-text="t('setup_advanced_api_title')">Cấu hình API Telegram</span>
                                    </div>
                                    <p x-html="t('setup_advanced_api_desc')"></p>
                                </div>
                                
                                <!-- Inputs -->
                                <div class="space-y-3">
                                    <div>
                                        <label class="block text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5"
                                            x-text="t('setup_api_id')">API ID</label>
                                        <div class="relative">
                                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400 dark:text-slate-500">
                                                <i class="fa-solid fa-fingerprint text-xs"></i>
                                            </span>
                                            <input type="number" x-model="custom_api_id" placeholder="123456"
                                                class="w-full pl-9 pr-3 py-2.5 text-sm rounded-xl bg-white/50 dark:bg-slate-900/40 border border-slate-200 dark:border-slate-800/80 focus:outline-none focus:ring-1 focus:ring-blue-500 text-slate-900 dark:text-white transition-all">
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <label class="block text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-1.5"
                                            x-text="t('setup_api_hash')">API HASH</label>
                                        <div class="relative" x-data="{ showHash: false }">
                                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400 dark:text-slate-500">
                                                <i class="fa-solid fa-key text-xs"></i>
                                            </span>
                                            <input :type="showHash ? 'text' : 'password'" x-model="custom_api_hash" placeholder="abcdef1234567890abcdef1234567890"
                                                class="w-full pl-9 pr-10 py-2.5 text-sm rounded-xl bg-white/50 dark:bg-slate-900/40 border border-slate-200 dark:border-slate-800/80 focus:outline-none focus:ring-1 focus:ring-blue-500 text-slate-900 dark:text-white transition-all font-mono">
                                            <button type="button" @click="showHash = !showHash" 
                                                class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
                                                <i class="fa-solid text-xs" :class="showHash ? 'fa-eye-slash' : 'fa-eye'"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <!-- Buttons Row -->
                                <div class="flex gap-2 pt-1">
                                    <button type="button" @click="saveCustomApi" :disabled="loading || !custom_api_id || !custom_api_hash"
                                        class="flex-1 py-2.5 rounded-xl bg-blue-600 hover:bg-blue-500 text-white text-xs font-semibold shadow-md hover:shadow-blue-500/10 transition-all active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-1.5">
                                        <i class="fa-solid fa-circle-check" x-show="!loading"></i>
                                        <i class="fa-solid fa-spinner fa-spin" x-show="loading"></i>
                                        <span x-text="t('setup_save_api')">Lưu & Áp dụng</span>
                                    </button>
                                    
                                    <button type="button" @click="restoreDefaultApi" :disabled="loading || !has_default_api || !api_id"
                                        class="py-2.5 px-3 rounded-xl bg-slate-100 hover:bg-slate-200 dark:bg-slate-900/60 dark:hover:bg-slate-800/80 border border-slate-200/40 dark:border-slate-800/40 text-slate-700 dark:text-slate-300 text-xs font-semibold transition-all active:scale-[0.98] disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center gap-1.5"
                                        :title="t('setup_restore_default_api')">
                                        <i class="fa-solid fa-rotate-left"></i>
                                        <span x-text="t('setup_restore_default_api') || 'Mặc định'">Mặc định</span>
                                    </button>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>

                <!-- Step 3: Log Group -->
                <form x-show="step === 3" 
                    x-transition:enter="transition ease-out duration-500"
                    x-transition:enter-start="opacity-0 translate-y-4"
                    x-transition:enter-end="opacity-100 translate-y-0"
                    @submit.prevent="submitLogGroup" x-cloak>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2"
                                x-text="t('setup_log_group_id')"></label>
                            <div class="relative">
                                <input type="text" x-model="log_group_id" placeholder="-1001234567890 or me" required
                                    class="w-full p-4 pr-28 rounded-xl bg-white/50 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700/50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-900 dark:text-white backdrop-blur-sm transition-all font-mono">
                                <div class="absolute right-2 top-1/2 -translate-y-1/2 flex items-center gap-1.5">
                                    <button type="button" @click="log_group_id = 'me'"
                                        class="px-2.5 py-1.5 rounded-lg bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-bold uppercase tracking-wider transition-all active:scale-95 shadow-md shadow-blue-500/20 select-none cursor-pointer"
                                        x-text="t('setup_use_me_btn')">Dùng 'me'</button>
                                    <button type="button" @click="log_group_id = ''" x-show="log_group_id"
                                        class="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-800/80 text-slate-400 hover:text-red-500 transition-colors cursor-pointer"
                                        :title="t('clear') || 'Xóa'">
                                        <i class="fa-solid fa-xmark text-sm"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Pros/Cons and Details about using 'me' vs Group -->
                            <div class="mt-4 p-4 rounded-2xl bg-white/30 dark:bg-slate-950/20 border border-slate-200/50 dark:border-slate-800/50 backdrop-blur-md shadow-sm space-y-3">
                                <div class="text-[11px] leading-relaxed space-y-2">
                                    <div class="font-bold flex items-center gap-1.5 text-blue-600 dark:text-blue-400">
                                        <i class="fa-solid fa-circle-question text-sm"></i>
                                        <span x-text="t('setup_log_group_explain_title')">Tại sao nên/không nên dùng 'me'?</span>
                                    </div>
                                    <div class="grid grid-cols-1 gap-2 mt-1">
                                        <div class="p-2.5 rounded-xl bg-amber-500/5 border border-amber-500/10">
                                            <span class="font-semibold text-amber-600 dark:text-amber-400 block mb-0.5" x-text="t('setup_log_group_explain_me_title')">⚠️ Dùng "me" (Saved Messages):</span>
                                            <p class="text-slate-600 dark:text-slate-400" x-text="t('setup_log_group_explain_me')"></p>
                                        </div>
                                        <div class="p-2.5 rounded-xl bg-emerald-500/5 border border-emerald-500/10">
                                            <span class="font-semibold text-emerald-600 dark:text-emerald-400 block mb-0.5" x-text="t('setup_log_group_explain_group_title')">✅ Dùng Nhóm (Log Group ID):</span>
                                            <p class="text-slate-600 dark:text-slate-400" x-text="t('setup_log_group_explain_group')"></p>
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- Guide to find LOG_GROUP_ID -->
                                <div class="pt-2 border-t border-slate-200/50 dark:border-slate-800/50 text-[11px] leading-relaxed text-slate-500 dark:text-slate-400">
                                    <div class="font-bold text-slate-700 dark:text-slate-300 flex items-center gap-1.5 mb-1.5">
                                        <i class="fa-solid fa-circle-info text-sm text-blue-500"></i>
                                        <span x-text="t('setup_log_group_guide_title')">Cách lấy LOG_GROUP_ID:</span>
                                    </div>
                                    <p x-html="t('setup_log_group_guide_desc')"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                    <button type="submit" :disabled="loading"
                        class="mt-6 w-full py-4 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-semibold transition-all shadow-lg active:scale-[0.98] flex justify-center items-center gap-2 disabled:opacity-50">
                        <i class="fa-solid fa-spinner fa-spin" x-show="loading"></i>
                        <span x-text="loading ? t('setup_testing') : t('setup_verify_continue')"></span>
                    </button>
                </form>

                <!-- Step 4: Admin Creation -->
                <form x-show="step === 4" 
                    x-transition:enter="transition ease-out duration-500"
                    x-transition:enter-start="opacity-0 translate-y-4"
                    x-transition:enter-end="opacity-100 translate-y-0"
                    @submit.prevent="submitAdmin" x-cloak>
                    <div class="space-y-4">
                        <input type="text" autocomplete="username" x-model="admin_username"
                            :placeholder="t('setup_admin_user')" required
                            class="w-full p-4 rounded-xl bg-white/50 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700/50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-900 dark:text-white backdrop-blur-sm transition-all">
                        <input type="password" autocomplete="new-password" x-model="admin_password"
                            :placeholder="t('setup_admin_pass')" required
                            class="w-full p-4 rounded-xl bg-white/50 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700/50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-900 dark:text-white backdrop-blur-sm transition-all">
                        <input type="password" autocomplete="new-password" x-model="admin_confirm"
                            :placeholder="t('setup_admin_confirm')" required
                            class="w-full p-4 rounded-xl bg-white/50 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700/50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-900 dark:text-white backdrop-blur-sm transition-all">
                    </div>
                    <button type="submit" :disabled="loading"
                        class="mt-8 w-full py-4 rounded-xl bg-emerald-600 hover:bg-emerald-500 text-white font-semibold transition-all shadow-lg active:scale-[0.98] flex justify-center items-center gap-2 disabled:opacity-50">
                        <i class="fa-solid fa-spinner fa-spin" x-show="loading"></i>
                        <span x-text="loading ? t('setup_creating') : t('setup_finish')"></span>
                    </button>
                </form>

                <!-- Step 5: Setup Complete -->
                <div x-show="step === 5" 
                    x-transition:enter="transition ease-out duration-500"
                    x-transition:enter-start="opacity-0 translate-y-4"
                    x-transition:enter-end="opacity-100 translate-y-0"
                    class="text-center space-y-6" x-cloak>
                    <div
                        class="w-20 h-20 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 rounded-full flex items-center justify-center text-3xl mx-auto shadow-lg shadow-emerald-500/20">
                        <i class="fa-solid fa-check"></i>
                    </div>
                    <div>
                        <h2 class="text-2xl font-bold text-slate-900 dark:text-white"
                            x-text="t('setup_complete_title')"></h2>
                        <p class="mt-2 text-slate-600 dark:text-slate-400" x-text="t('setup_complete_desc')"></p>
                    </div>
                    <template x-if="log_group_id !== 'me' && log_group_id !== 'self'">
                        <div class="p-4 rounded-xl bg-blue-50 dark:bg-blue-900/20 border border-blue-200/50 dark:border-blue-800/30 text-blue-800 dark:text-blue-200 text-xs leading-relaxed text-left flex items-start gap-2">
                            <i class="fa-solid fa-circle-info text-blue-500 dark:text-blue-400 mt-0.5 flex-shrink-0"></i>
                            <span x-text="t('setup_bot_pool_suggest')"></span>
                        </div>
                    </template>
                    <div
                        class="p-4 rounded-xl bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-700/50 text-amber-800 dark:text-amber-200 text-sm leading-relaxed">
                        <i class="fa-solid fa-circle-info mr-1"></i>
                        <span x-text="t('setup_restart_note')"></span>
                    </div>
                    <button @click="doRestart" :disabled="loading"
                        class="w-full py-4 rounded-xl bg-emerald-600 hover:bg-emerald-500 text-white font-semibold transition-all shadow-lg active:scale-[0.98] flex justify-center items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fa-solid fa-spinner fa-spin" x-show="loading"></i>
                        <span x-text="loading ? t('setup_restarting') : t('setup_restart_finish')"></span>
                    </button>
                </div>
                </div>
            </div>
</div> <!-- Close main content wrapper -->

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('setupWizard', (initApiId, initApiHash, hasDefaultApi, initLogGroupId, adminExists) => ({
                step: 1, // 1: API, 2: Auth, 3: LogGroup, 4: Admin, 5: Complete
                admin_exists: adminExists,
                authStep: 'phone', // phone, code, password

                api_id: initApiId === '0' ? '' : initApiId,
                api_hash: initApiHash,
                has_default_api: hasDefaultApi,

                custom_api_id: initApiId === '0' ? '' : initApiId,
                custom_api_hash: initApiHash,

                showAdvanced: false,
                log_group_id: initLogGroupId || '',

                admin_username: '',
                admin_password: '',
                admin_confirm: '',
                phone: '',
                code: '',
                password: '',

                qr_url: '',
                qr_timestamp: Date.now(),
                qr_poll_interval: null,
                qr_countdown: 30,
                qr_timer: null,

                loading: false,

                lang: TeleCloud.lang,
                t(key, params) { return TeleCloud.t(key, params, this.lang); },
                async setLang(code) {
                    this.loading = true;
                    await TeleCloud.setLang(code);
                    this.lang = code;
                    this.loading = false;
                },

                toastModal: {
                    show: false,
                    type: 'success',
                    message: '',
                    persistent: false
                },

                showError(msg) {
                    this.toastModal = { show: true, type: 'error', message: msg, persistent: false };
                },

                translationsLoaded: TeleCloud.translationsLoaded,

                async init() {
                    TeleCloud.initTheme('system');
                    this.qr_timer = setInterval(() => {
                        if (this.authStep === 'qr' && this.qr_url && this.qr_countdown > 0) {
                            this.qr_countdown--;
                        }
                    }, 1000);
                    window.addEventListener('tc-translations-loaded', (e) => {
                        this.lang = ''; // Force reactivity trigger
                        this.$nextTick(() => {
                            this.lang = e.detail.lang;
                            this.translationsLoaded = true;
                        });
                    });

                    if (TeleCloud.translationsLoaded) {
                        this.translationsLoaded = true;
                    }

                    let hasConfig = (this.api_id && this.api_hash) || this.has_default_api;
                    if (hasConfig) {
                        this.loading = true;
                        try {
                            if (this.api_id && this.api_hash) {
                                // Auto save custom config
                                await this.doApiConfig();
                            }

                            // Check if telegram is already authorized
                            let isAuth = await this.checkTgAuth();
                            if (isAuth) {
                                this.step = 3;
                            } else {
                                this.step = 2;
                            }
                        } catch (e) {
                            // Fallback to step 1 if auto-save fails
                            this.step = 1;
                        }
                        this.loading = false;
                    }
                },

                getStepIcon() {
                    return {
                        1: 'fa-key',
                        2: 'fa-paper-plane',
                        3: 'fa-book',
                        4: 'fa-user-shield',
                        5: 'fa-circle-check'
                    }[this.step];
                },

                getStepTitle() {
                    return {
                        1: this.t('setup_step_api'),
                        2: this.t('setup_step_auth'),
                        3: this.t('setup_step_log'),
                        4: this.t('setup_step_admin'),
                        5: this.t('setup_step_done')
                    }[this.step];
                },

                getStepDesc() {
                    return {
                        1: this.t('setup_desc_api'),
                        2: this.t('setup_desc_auth'),
                        3: this.t('setup_desc_log'),
                        4: this.t('setup_desc_admin'),
                        5: this.t('setup_complete_desc')
                    }[this.step];
                },

                async doApiConfig() {
                    let fd = new FormData();
                    fd.append('api_id', this.api_id);
                    fd.append('api_hash', this.api_hash);
                    fd.append('site_url', window.location.origin);
                    let r = await fetch('/api/setup/config', { method: 'POST', body: fd, headers: { 'X-CSRF-Token': TeleCloud.getCsrfToken() } });
                    if (!r.ok) throw new Error((await r.json()).error || 'Failed');
                },

                async submitApiConfig() {
                    this.loading = true;
                    try {
                        await this.doApiConfig();
                        this.step = 2;
                    } catch (e) {
                        this.showError(e.message);
                    }
                    this.loading = false;
                },

                async saveCustomApi() {
                    if (!this.custom_api_id || !this.custom_api_hash) {
                        this.showError('API ID and API Hash are required');
                        return;
                    }
                    this.loading = true;
                    try {
                        this.api_id = this.custom_api_id;
                        this.api_hash = this.custom_api_hash;
                        await this.doApiConfig();
                        this.toastModal = {
                            show: true,
                            type: 'success',
                            message: this.t('setup_api_saved'),
                            persistent: false
                        };
                    } catch (e) {
                        this.showError(e.message);
                    }
                    this.loading = false;
                },

                async restoreDefaultApi() {
                    this.loading = true;
                    try {
                        let fd = new FormData();
                        fd.append('restore_default', 'true');
                        fd.append('site_url', window.location.origin);
                        let r = await fetch('/api/setup/config', { method: 'POST', body: fd, headers: { 'X-CSRF-Token': TeleCloud.getCsrfToken() } });
                        if (!r.ok) throw new Error((await r.json()).error || 'Failed');

                        this.api_id = '';
                        this.api_hash = '';
                        this.custom_api_id = '';
                        this.custom_api_hash = '';

                        this.toastModal = {
                            show: true,
                            type: 'success',
                            message: this.t('setup_api_restored'),
                            persistent: false
                        };
                    } catch (e) {
                        this.showError(e.message);
                    }
                    this.loading = false;
                },

                formatBotError(err) {
                    if (!err) return '';
                    let errStr = err.toLowerCase();
                    if (errStr.includes('invalid') || errStr.includes('400') || errStr.includes('unauthorized')) {
                        if (errStr.includes('peer') || errStr.includes('channel') || errStr.includes('chat') || errStr.includes('resolve')) {
                            return this.t('err_bot_peer_invalid');
                        }
                        return this.t('err_bot_token_invalid');
                    }
                    if (errStr.includes('write_forbidden') || errStr.includes('forbidden') || errStr.includes('write')) {
                        return this.t('err_bot_write_forbidden');
                    }
                    if (errStr.includes('timeout') || errStr.includes('deadline')) {
                        return this.t('err_bot_timeout');
                    }
                    return err;
                },

                async checkTgAuth() {
                    try {
                        let r = await fetch('/api/setup/tg/status');
                        let res = await r.json();
                        return res.authorized === true;
                    } catch (e) {
                        return false;
                    }
                },

                async submitPhone() {
                    this.loading = true;
                    try {
                        let fd = new FormData();
                        fd.append('phone', this.phone);
                        let r = await fetch('/api/setup/tg/phone', { method: 'POST', body: fd, headers: { 'X-CSRF-Token': TeleCloud.getCsrfToken() } });
                        if (!r.ok) throw new Error((await r.json()).error || 'Failed');

                        // Don't change authStep manually, let pollAuthStatus handle it
                        this.pollAuthStatus();
                    } catch (e) {
                        this.showError(e.message);
                        this.loading = false;
                    }
                },

                async startQRLogin() {
                    this.loading = true;
                    this.authStep = 'qr';
                    this.qr_url = '';
                    try {
                        let r = await fetch('/api/setup/tg/qr', { method: 'POST', headers: { 'X-CSRF-Token': TeleCloud.getCsrfToken() } });
                        if (!r.ok) throw new Error((await r.json()).error || 'Failed');
                        this.pollAuthStatus();
                    } catch (e) {
                        this.showError(e.message);
                        this.loading = false;
                    }
                },

                async submitCode() {
                    this.loading = true;
                    try {
                        let fd = new FormData();
                        fd.append('code', this.code);
                        let r = await fetch('/api/setup/tg/code', { method: 'POST', body: fd, headers: { 'X-CSRF-Token': TeleCloud.getCsrfToken() } });
                        let res = await r.json();
                        if (!r.ok) {
                            if (res.error === 'SESSION_EXPIRED') {
                                throw new Error(this.t('setup_session_expired'));
                            }
                            throw new Error(this.t('setup_otp_invalid'));
                        }
                    } catch (e) {
                        this.showError(e.message);
                        this.loading = false;
                        if (e.message === this.t('setup_session_expired')) this.authStep = 'phone';
                    }
                },

                async submitPassword() {
                    this.loading = true;
                    try {
                        let fd = new FormData();
                        fd.append('password', this.password);
                        let r = await fetch('/api/setup/tg/password', { method: 'POST', body: fd, headers: { 'X-CSRF-Token': TeleCloud.getCsrfToken() } });
                        let res = await r.json();
                        if (!r.ok) {
                            if (res.error === 'SESSION_EXPIRED') {
                                throw new Error(this.t('setup_session_expired'));
                            }
                            throw new Error(this.t('setup_2fa_invalid'));
                        }
                    } catch (e) {
                        this.showError(e.message);
                        this.loading = false;
                        if (e.message === this.t('setup_session_expired')) this.authStep = 'phone';
                    }
                },

                async cancelAuthFlow() {
                    this.loading = true;
                    try {
                        await fetch('/api/setup/tg/cancel', { method: 'POST', headers: { 'X-CSRF-Token': TeleCloud.getCsrfToken() } });
                        this.authStep = 'phone';
                        // Clear the poll and error when cancelling
                        if (this.qr_poll_interval) {
                            clearInterval(this.qr_poll_interval);
                            this.qr_poll_interval = null;
                        }
                    } catch (e) { }
                    this.loading = false;
                },

                pollAuthStatus() {
                    if (this.qr_poll_interval) clearInterval(this.qr_poll_interval);
                    this.qr_poll_interval = setInterval(async () => {
                        try {
                            let r = await fetch('/api/setup/tg/status');
                            let res = await r.json();

                            if (res.error) {
                                clearInterval(this.qr_poll_interval);
                                let errMsg = res.error;
                                let terminal = true;

                                if (errMsg.includes('PASSWORD_HASH_INVALID')) {
                                    errMsg = this.t('setup_2fa_invalid');
                                    terminal = false;
                                }
                                if (errMsg.includes('PHONE_CODE_INVALID')) {
                                    errMsg = this.t('setup_otp_invalid');
                                    terminal = false;
                                }
                                if (errMsg.includes('FLOOD_WAIT')) {
                                    errMsg = this.t('setup_flood_wait');
                                    terminal = false;
                                }

                                if (terminal) {
                                    clearInterval(this.qr_poll_interval);
                                    this.qr_poll_interval = null;
                                    if (errMsg.includes('API_ID_INVALID') || errMsg.includes('API_HASH_INVALID') || errMsg.includes('API_ID_PUBLISHED_FLOOD')) {
                                        errMsg = this.t('setup_api_invalid');
                                        this.step = 1;
                                    }
                                }

                                this.showError(errMsg);
                                this.loading = false;
                                if (terminal) {
                                    this.authStep = 'phone';
                                    return;
                                }
                            }

                            if (res.authorized) {
                                clearInterval(this.qr_poll_interval);
                                this.qr_poll_interval = null;
                                this.loading = false;
                                this.toastModal = {
                                    show: true,
                                    type: 'success',
                                    message: this.t('setup_auth_success'),
                                    persistent: false
                                };
                                setTimeout(() => {
                                    this.toastModal.show = false;
                                    this.step = 3;
                                }, 1500);
                            } else if (res.authState === 'verifying') {
                                this.loading = true;
                            } else if (res.authState === 'password' || res.authState === 'password_error') {
                                this.authStep = 'password';
                                this.loading = false;
                                if (res.authState === 'password_error') {
                                    this.showError(this.t('setup_2fa_invalid'));
                                }
                            } else if (res.authState === 'code' || res.authState === 'code_error') {
                                this.authStep = 'code';
                                this.loading = false;
                                if (res.authState === 'code_error') {
                                    this.showError(this.t('setup_otp_invalid'));
                                }
                            }

                            if (res.transient_error) {
                                let tErr = res.transient_error;
                                if (tErr === 'PASSWORD_HASH_INVALID' || tErr === 'PASSWORD_INVALID') tErr = this.t('setup_2fa_invalid');
                                if (tErr === 'PHONE_CODE_INVALID') tErr = this.t('setup_otp_invalid');
                                this.showError(tErr);
                                this.loading = false;
                            }

                            if (res.qr_url) {
                                if (this.qr_url !== res.qr_url) {
                                    this.qr_url = res.qr_url;
                                    this.qr_timestamp = Date.now();
                                    this.qr_countdown = 30; // Reset countdown
                                }
                                this.loading = false;
                            }
                        } catch (e) { }
                    }, 2000);
                },

                async doLogGroup() {
                    let fd = new FormData();
                    fd.append('log_group_id', this.log_group_id);
                    let r = await fetch('/api/setup/tg/test-log-group', { method: 'POST', body: fd, headers: { 'X-CSRF-Token': TeleCloud.getCsrfToken() } });
                    let res = await r.json();
                    if (!r.ok) {
                        let errMsg = res.error || 'Failed';
                        if (errMsg.includes('PEER_ID_INVALID') || errMsg.includes('CHANNEL_INVALID') || errMsg.includes('could not resolve log group')) {
                            errMsg = this.t('setup_log_invalid');
                        }
                        throw new Error(errMsg);
                    }

                    if (this.admin_exists) {
                        this.step = 5;
                    } else {
                        this.step = 4;
                    }
                },

                async submitLogGroup() {
                    this.loading = true;
                    try {
                        await this.doLogGroup();
                    } catch (e) {
                        this.showError(e.message);
                    }
                    this.loading = false;
                },

                async submitAdmin() {
                    if (this.admin_password !== this.admin_confirm) {
                        return this.showError(this.t('setup_pass_mismatch'));
                    }
                    this.loading = true;
                    try {
                        let fd = new FormData();
                        fd.append('username', this.admin_username);
                        fd.append('password', this.admin_password);
                        fd.append('site_url', window.location.origin);
                        let r = await fetch('/setup', { method: 'POST', body: fd, headers: { 'X-CSRF-Token': TeleCloud.getCsrfToken() } });
                        if (!r.ok) throw new Error((await r.json()).error || 'Failed');

                        this.step = 5;
                    } catch (e) {
                        this.showError(e.message);
                    }
                    this.loading = false;
                },

                async doRestart() {
                    this.loading = true;
                    try {
                        let r = await fetch('/api/setup/restart', { method: 'POST', headers: { 'X-CSRF-Token': TeleCloud.getCsrfToken() } });
                        if (!r.ok) throw new Error(this.t('setup_restart_failed'));

                        // Intelligent polling to wait for server restart and login
                        let pollCount = 0;
                        const poll = setInterval(async () => {
                            pollCount++;
                            try {
                                let statusR = await fetch('/api/system/status');
                                if (statusR.ok) {
                                    let status = await statusR.json();
                                    if (status.ready) {
                                        clearInterval(poll);
                                        window.location.href = '/';
                                    }
                                }
                            } catch (e) {
                                // Server is likely down during restart, just keep polling
                            }

                            // Safety timeout: if after 60 seconds it's still not ready, just try redirecting
                            if (pollCount > 60) {
                                clearInterval(poll);
                                window.location.href = '/';
                            }
                        }, 2000);
                    } catch (e) {
                        this.showError(e.message);
                        this.loading = false;
                    }
                }
            }));
        });
    </script>
