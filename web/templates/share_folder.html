                    </select>

                    <!-- Zoom In -->
                    <button @click="pdfZoomIn()"
                        class="p-2 text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition-all duration-200">
                        <i class="fa-solid fa-plus text-xs"></i>
                    </button>
                </div>

                <!-- Mobile Settings Toggle -->
                <button @click="pdfViewer.settingsOpen = !pdfViewer.settingsOpen"
                    class="sm:hidden p-2 text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition-all duration-200"
                    :class="pdfViewer.settingsOpen ? 'text-blue-600 bg-slate-100 dark:bg-slate-700' : ''"
                    title="Settings">
                    <i class="fa-solid fa-sliders text-sm"></i>
                </button>

                <!-- Close Button -->
                <button @click.stop="closePdfViewer()"
                    class="p-2 text-slate-500 dark:text-slate-400 hover:text-white hover:bg-red-500 dark:hover:bg-red-500 rounded-xl transition-all duration-200">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
        </header>

        <!-- Collapsible Mobile Settings Toolbar -->
        <div x-show="pdfViewer.settingsOpen" x-collapse
            class="sm:hidden flex flex-wrap items-center justify-between gap-3 p-3 border-b border-slate-200 dark:border-slate-700/50 bg-slate-50 dark:bg-slate-800 transition-all duration-200">
            <!-- Zoom adjustments -->
            <div class="flex items-center gap-2">
                <button @click="pdfZoomOut()"
                    class="p-2 text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition-all duration-200">
                    <i class="fa-solid fa-minus text-xs"></i>
                </button>
                <select @change="pdfSetZoom($event.target.value)" :value="pdfViewer.zoom"
                    class="px-2 py-1 text-xs font-bold rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 focus:outline-none transition-all cursor-pointer">
                    <option value="width">Fit Width</option>
                    <option value="height">Fit Height</option>
                    <option value="50">50%</option>
                    <option value="75">75%</option>
                    <option value="100">100%</option>
                    <option value="125">125%</option>
                    <option value="150">150%</option>
                    <option value="200">200%</option>
                    <option value="300">300%</option>
                </select>
                <button @click="pdfZoomIn()"
                    class="p-2 text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition-all duration-200">
                    <i class="fa-solid fa-plus text-xs"></i>
                </button>
            </div>

            <!-- Auto scroll and Invert Filter -->
            <div class="flex items-center gap-2">
                <!-- Scroll Mode Toggle -->
                <button @click.stop="togglePdfScrollMode()"
                    class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition-all duration-200 text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400"
                    :class="pdfViewer.scrollMode === 'continuous' ? 'text-violet-600 dark:text-violet-400 bg-slate-100 dark:bg-slate-700' : ''"
                    :title="pdfViewer.scrollMode === 'page' ? t('scroll_continuous') : t('scroll_page')">
                    <i class="fa-solid text-sm"
                        :class="pdfViewer.scrollMode === 'page' ? 'fa-scroll' : 'fa-file-lines'"></i>
                </button>

                <!-- Dark mode invert filter toggle -->
                <button
                    @click="pdfViewer.darkModeFilter = !pdfViewer.darkModeFilter; renderPdfPage(pdfViewer.currentPage)"
                    class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition-all duration-200"
                    :class="pdfViewer.darkModeFilter ? 'text-amber-500 bg-slate-100 dark:bg-slate-700' : 'text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400'"
                    title="Invert Filter">
                    <i class="fa-solid fa-circle-half-stroke text-sm"></i>
                </button>

                <!-- Auto scroll play/pause -->
                <button @click="togglePdfAutoScroll()"
                    class="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-xl transition-all duration-200"
                    :class="pdfViewer.autoScrollActive ? 'text-emerald-600 dark:text-emerald-400 bg-slate-100 dark:bg-slate-700' : 'text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400'"
                    :title="pdfViewer.autoScrollActive ? t('pdf_auto_scroll_stop') : t('pdf_auto_scroll_start')">
                    <i class="fa-solid text-sm" :class="pdfViewer.autoScrollActive ? 'fa-pause' : 'fa-play'"></i>
                </button>

                <!-- Speed controls (only when auto scroll is active) -->
                <template x-if="pdfViewer.autoScrollActive">
                    <div
                        class="flex items-center gap-1 bg-slate-100 dark:bg-slate-700 rounded-xl p-1 transition-all duration-200">
                        <button @click="changePdfAutoScrollSpeed(-1)"
                            class="p-1 text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-white dark:hover:bg-slate-600 rounded-lg transition-all duration-200"
                            title="Slower">
                            <i class="fa-solid fa-minus text-[10px]"></i>
                        </button>
                        <span
                            class="text-[10px] font-bold font-mono text-slate-600 dark:text-slate-300 min-w-[20px] text-center"
                            x-text="pdfViewer.autoScrollSpeed + 'x'"></span>
                        <button @click="changePdfAutoScrollSpeed(1)"
                            class="p-1 text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 hover:bg-white dark:hover:bg-slate-600 rounded-lg transition-all duration-200"
                            title="Faster">
                            <i class="fa-solid fa-plus text-[10px]"></i>
                        </button>
                    </div>
                </template>
            </div>
        </div>

        <!-- Main Container: Sidebar + PDF Canvas Area -->
        <div class="flex-1 flex min-h-0 relative">

            <!-- Table of Contents Slide-over Sidebar -->
            <div x-show="pdfViewer.sidebarOpen" x-cloak
                class="absolute inset-y-0 left-0 w-80 max-w-full bg-slate-50 dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700/50 shadow-2xl z-40 flex flex-col"
                x-transition:enter="transition ease-out duration-300" x-transition:enter-start="-translate-x-full"
                x-transition:enter-end="translate-x-0" x-transition:leave="transition ease-in duration-200"
                x-transition:leave-start="translate-x-0" x-transition:leave-end="-translate-x-full">

                <div
                    class="p-4 border-b border-slate-200 dark:border-slate-700/50 flex justify-between items-center bg-slate-100/50 dark:bg-slate-800/50">
                    <span
                        class="font-bold text-slate-900 dark:text-white text-sm uppercase tracking-wider text-ellipsis overflow-hidden"
                        x-text="t('outline') || 'Mục lục'"></span>
                    <button @click="pdfViewer.sidebarOpen = false"
                        class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
                        <i class="fa-solid fa-xmark text-lg"></i>
                    </button>
                </div>

                <!-- Outline tree list -->
                <div class="flex-1 overflow-y-auto p-2 space-y-1">
                    <template x-if="pdfViewer.toc.length === 0">
                        <div class="p-4 text-center text-xs text-slate-400"
                            x-text="t('no_outline') || 'Không có mục lục'"></div>
                    </template>
                    <template x-for="(item, index) in pdfViewer.toc" :key="index">
                        <button @click="pdfJumpToPage(item.page)"
                            class="w-full text-left py-2 rounded-xl hover:bg-white dark:hover:bg-slate-700 text-xs sm:text-sm transition-all duration-200 hover:text-blue-600 dark:hover:text-white flex items-center justify-between border border-transparent hover:border-slate-200 dark:hover:border-slate-600"
                            :class="item.depth > 0 ? 'text-slate-500 dark:text-slate-400 font-normal pr-2.5' : 'text-slate-700 dark:text-slate-300 font-semibold pr-3'"
                            :style="'padding-left: ' + (12 + (item.depth || 0) * 16) + 'px'">
                            <span class="truncate pr-2" x-text="item.title"></span>
                            <span class="text-[10px] text-slate-400 font-mono" x-show="item.page"
                                x-text="'p. ' + item.page"></span>
                        </button>
                    </template>
                </div>
            </div>

            <!-- Dim Overlay when sidebar is open -->
            <div x-show="pdfViewer.sidebarOpen" @click="pdfViewer.sidebarOpen = false" x-cloak
                class="absolute inset-0 bg-black/30 dark:bg-black/50 z-30 transition-opacity duration-300"></div>

            <!-- PDF Viewer Center Canvas View -->
            <div
                class="flex-1 flex flex-col items-center justify-center p-4 relative bg-slate-100/30 dark:bg-slate-950/20">
                <!-- Spinner/Loader with Progress -->
                <div x-show="pdfViewer.loading" x-cloak
                    class="absolute inset-0 flex flex-col items-center justify-center gap-4 bg-white dark:bg-slate-900 z-10">
                    <div class="w-14 h-14 rounded-full border-4 border-red-500/20 border-t-red-500 animate-spin"></div>
                    <p class="text-sm font-bold text-slate-700 dark:text-slate-200 truncate max-w-[80%] text-center"
                        x-text="pdfViewer.file?.filename"></p>
                    <p class="text-xs text-slate-400 font-medium animate-pulse" x-text="t('loading')"></p>
                </div>

                <!-- pdf-viewer-area Container -->
                <div id="pdf-viewer-area"
                    :class="[
                        pdfViewer.scrollMode === 'continuous' ? 'p-0 overflow-hidden' : 'p-2 sm:p-4',
                        (pdfViewer.zoom !== 'width' && pdfViewer.zoom !== 'height') ? 'overflow-auto block cursor-grab' : 'overflow-hidden flex items-center justify-center'
                    ]"
                    class="h-full w-full max-w-4xl mx-auto shadow-sm rounded-2xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700/50 relative">
                    <!-- Page rendering indicator -->
                    <div x-show="pdfViewer.pageLoading && pdfViewer.scrollMode === 'page'" x-cloak
                        class="absolute top-4 right-4 z-20 bg-slate-800/80 backdrop-blur text-white text-xs px-2.5 py-1.5 rounded-lg flex items-center gap-2 shadow font-bold">
                        <div class="w-3.5 h-3.5 rounded-full border-2 border-white/20 border-t-white animate-spin">
                        </div>
                        <span x-text="t('rendering') || 'Đang vẽ trang...'"></span>
                    </div>

                    <!-- The canvas itself -->
                    <canvas x-show="pdfViewer.scrollMode === 'page'" id="pdf-canvas"
                        @dblclick="togglePdfZoom($event)"
                        :class="pdfViewer.darkModeFilter ? 'pdf-canvas-invert' : ''"
                        class="shadow-lg transition-transform duration-200 origin-top"></canvas>

                    <!-- Continuous PDF container -->
                    <div id="share-folder-pdf-continuous-container" x-show="pdfViewer.scrollMode === 'continuous'"
                        @scroll.debounce.50ms="trackPdfContinuousScroll($el)"
                        class="w-full h-full overflow-y-auto flex flex-col items-center gap-6 py-4 hide-scrollbar select-none bg-slate-100/10">
                        <template x-for="pageNum in pdfViewer.numPages" :key="pageNum">
                            <div class="pdf-page-wrapper bg-white dark:bg-slate-800 shadow-md rounded-md p-1 flex items-center justify-center relative"
                                :data-page="pageNum" x-init="registerPdfLazyPage($el, pageNum)">
                                <canvas :id="'pdf-canvas-' + pageNum"
                                    :class="pdfViewer.darkModeFilter ? 'pdf-canvas-invert' : ''"
                                    class="max-w-full origin-top"></canvas>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom progress slider -->
        <footer
            class="relative z-30 bg-slate-50 dark:bg-slate-800/80 border-t border-slate-200 dark:border-slate-700/50 p-3 sm:px-6 flex items-center justify-between gap-4">
            <!-- Prev page -->
            <button @click="pdfPrevPage()" :disabled="pdfViewer.currentPage <= 1"
                class="p-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors disabled:opacity-30 disabled:cursor-not-allowed text-slate-600 dark:text-slate-300">
                <i class="fa-solid fa-chevron-left"></i>
            </button>

            <!-- Progress bar -->
            <div class="flex-1 flex items-center gap-3">
                <div class="flex-1 bg-slate-200 dark:bg-slate-700 rounded-full h-2 relative overflow-hidden">
                    <div class="bg-gradient-to-r from-red-500 to-rose-600 h-full rounded-full transition-all duration-300"
                        :style="`width: ${pdfViewer.pageProgress}%`"></div>
                </div>
                <div class="flex items-center gap-1.5 whitespace-nowrap">
                    <input type="number" 
                        :value="pdfViewer.currentPage" 
                        @change="const p = parseInt($event.target.value, 10); if(p >= 1 && p <= pdfViewer.numPages) { pdfJumpToPage(p); } else { $event.target.value = pdfViewer.currentPage; }"
                        class="w-12 text-center py-0.5 text-xs font-bold font-mono rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-1 focus:ring-red-500"
                        min="1" 
                        :max="pdfViewer.numPages">
                    <span class="text-xs font-bold font-mono text-slate-500 dark:text-slate-400">/ <span x-text="pdfViewer.numPages"></span></span>
                </div>
            </div>

            <!-- Next page -->
            <button @click="pdfNextPage()" :disabled="pdfViewer.currentPage >= pdfViewer.numPages"
                class="p-2 rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors disabled:opacity-30 disabled:cursor-not-allowed text-slate-600 dark:text-slate-300">
                <i class="fa-solid fa-chevron-right"></i>
            </button>
        </footer>
    </div>    <!-- ==================== PRIVACY & SECURITY MODAL ==================== -->
    <div x-show="showPrivacyModal" x-cloak
        class="fixed inset-0 z-[600] flex items-center justify-center bg-slate-900/60 backdrop-blur-md p-4"
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
        x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
        @keyup.window.escape="showPrivacyModal = false">
        
        <div @click.outside="showPrivacyModal = false"
            class="glass-panel w-full max-w-lg rounded-[2.5rem] p-6 sm:p-8 border border-white/10 shadow-2xl relative flex flex-col gap-6 animate-modal-in max-h-[85vh] overflow-y-auto custom-scrollbar">
            
            <!-- Modal Header -->
            <div class="flex items-center justify-between pb-4 border-b border-slate-200/50 dark:border-slate-700/50">
                <h3 class="text-lg sm:text-xl font-bold text-slate-900 dark:text-white flex items-center gap-2.5">
                    <i class="fa-solid fa-user-shield text-blue-500"></i>
                    <span x-text="t('privacy_title')"></span>
                </h3>
                <button @click="showPrivacyModal = false" class="p-1.5 rounded-full text-slate-400 hover:text-slate-600 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <!-- Modal Content -->
            <div class="space-y-6 text-sm leading-relaxed text-slate-600 dark:text-slate-300">
                <div class="space-y-4">
                    <div class="bg-blue-500/10 border border-blue-500/20 rounded-2xl p-4 flex gap-3">
                        <i class="fa-solid fa-code text-blue-500 text-lg mt-0.5 shrink-0"></i>
                        <div>
                            <h4 class="font-bold text-slate-800 dark:text-slate-100 mb-1" x-text="t('privacy_os_title')"></h4>
                            <p class="text-xs" x-text="t('privacy_os_desc')"></p>
                        </div>
                    </div>

                    <div class="bg-amber-500/10 border border-amber-500/20 rounded-2xl p-4 flex gap-3">
                        <i class="fa-solid fa-triangle-exclamation text-amber-500 text-lg mt-0.5 shrink-0"></i>
                        <div>
                            <h4 class="font-bold text-slate-800 dark:text-slate-100 mb-1" x-text="t('privacy_disclaimer_title')"></h4>
                            <p class="text-xs" x-html="t('privacy_disclaimer_desc')"></p>
                        </div>
                    </div>

                    <div class="bg-emerald-500/10 border border-emerald-500/20 rounded-2xl p-4 flex gap-3">
                        <i class="fa-solid fa-lock text-emerald-500 text-lg mt-0.5 shrink-0"></i>
                        <div>
                            <h4 class="font-bold text-slate-800 dark:text-slate-100 mb-1" x-text="t('privacy_security_title')"></h4>
                            <p class="text-xs" x-text="t('privacy_security_desc')"></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Modal Footer -->
            <button @click="showPrivacyModal = false"
                class="w-full py-3 rounded-2xl bg-blue-600 hover:bg-blue-500 text-white font-bold text-sm shadow-lg shadow-blue-500/20 transition-all active:scale-95 text-center cursor-pointer"
                x-text="t('privacy_understand')">
            </button>
        </div>
    </div>


</body>

</html>
