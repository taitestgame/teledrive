<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{{ .filename }} - TeleCloud Share</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/favicon.png">
    <link rel="apple-touch-icon" href="/static/favicon.png">

    <link rel="preload" href="/static/css/tailwind.css?v={{ .version }}" as="style">
    <link rel="preload" href="/static/css/style.min.css?v={{ .version }}" as="style">
    <link rel="preload" href="/static/js/common.min.js?v={{ .version }}" as="script">
    <link rel="modulepreload" href="/static/js/script.min.js?v={{ .version }}">

    <link rel="stylesheet" href="/static/css/tailwind.css?v={{ .version }}">
    <link rel="stylesheet" href="/static/css/style.min.css?v={{ .version }}">
    <script>window.TELECLOUD_VERSION = '{{ .version }}';</script>
    <script src="/static/js/common.min.js?v={{ .version }}"></script>
    <script>TeleCloud.version = '{{ .version }}';</script>
    <script type="module" src="/static/js/script.min.js?v={{ .version }}"></script>


    <style>
        .pdf-canvas-invert {
            filter: invert(1) hue-rotate(180deg) !important;
        }
        #app-preloader {
            position: fixed;
            inset: 0;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #090d16; /* Slate 950 fallback */
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.4s;
        }
        /* Custom spinner fallback to render immediately without external resources */
        .preloader-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(59, 130, 246, 0.1);
            border-radius: 50%;
            border-top-color: #3b82f6;
            animation: preloader-spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        @keyframes preloader-spin {
            to { transform: rotate(360deg); }
        }
        .preloader-hidden {
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }
        body.preloader-active {
            overflow: hidden !important;
        }
    </style>


    <!-- SEO & Social Meta Tags -->
    <meta name="description" content="Shared Folder: {{ .filename }}">
    <meta property="og:title" content="{{ .filename }} - TeleCloud Share">
    <meta property="og:description" content="View and download files from this shared folder.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/static/favicon.ico">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{ .filename }} - TeleCloud Share">
    <meta name="twitter:description" content="View and download files from this shared folder.">
</head>

<body
    class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 h-full relative overflow-hidden flex flex-col transition-colors duration-500 preloader-active"
    :data-theme="currentTheme" x-data="shareApp()">

    <!-- App Preloader Overlay -->
    <div id="app-preloader" class="bg-slate-50 dark:bg-slate-950">
        <div class="flex flex-col items-center gap-4">
            <!-- Pulsing outer circle -->
            <div class="relative w-20 h-20 flex items-center justify-center">
                <!-- Inner spinner -->
                <div class="preloader-spinner"></div>
                <div class="absolute w-10 h-10 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/25">
                    <i class="fa-solid fa-cloud text-white text-base"></i>
                </div>
            </div>
            <div class="flex flex-col items-center gap-1 text-center px-4">
                <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400 bg-clip-text text-transparent">TeleCloud OS</h1>
                <span class="text-xs text-slate-400 dark:text-slate-500 font-medium">Loading shared folder...</span>
            </div>
        </div>
    </div>

    <span x-ref="token" class="hidden">{{ .token }}</span>

    <div class="blob-1"></div>
    <div class="blob-2"></div>



    <div x-show="contextMenu.show" x-cloak @click.outside="closeContextMenu" @contextmenu.prevent="closeContextMenu"
        :style="`top: ${contextMenu.y}px; left: ${contextMenu.x}px;`"
        class="fixed glass-menu z-[100] w-52 rounded-2xl p-1.5 text-sm shadow-2xl" x-transition.opacity.duration.200ms>
        <template x-if="contextMenu.file">
            <div>
                <template x-if="!contextMenu.file.is_folder">
                    <button @click="startDownload(contextMenu.file.id); closeContextMenu()"
                        class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-700/50 text-slate-700 dark:text-slate-200 font-medium transition-colors">
                        <i class="fa-solid fa-download fa-fw text-slate-400"></i> <span x-text="t('download')"></span>
                    </button>
                </template>
            </div>
        </template>
    </div>

    <div x-show="fileInfoModal.show" x-cloak
        class="fixed inset-0 z-[250] flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4 overflow-y-auto"
        x-transition.opacity>
        <div @click.outside="closeFileInfoModal()"
            class="glass-menu w-[90%] max-h-[85dvh] md:max-h-[90vh] rounded-[2rem] shadow-2xl animate-modal-in border border-white/20 transition-all duration-300 flex flex-col overflow-hidden"
            :class="(fileInfoModal.isLarge && !fileInfoModal.needsLoad && !fileInfoModal.isPreviewLoading && (!fileInfoModal.tooLarge || fileInfoModal.bypassWarning)) ? (fileInfoModal.isMedia ? 'md:max-w-lg max-w-sm' : 'modal-wide') : 'max-w-sm'">

            <!-- Non-scrolling Opaque Header -->
            <div
                class="flex items-start gap-4 p-6 pb-4 border-b border-[var(--border-main)] bg-[var(--bg-surface)] rounded-t-[2rem] shrink-0">
                <div class="w-14 h-14 rounded-2xl flex items-center justify-center shadow-inner shrink-0 transition-colors overflow-hidden relative"
                    :class="fileInfoModal.bgColor">
                    <template x-if="fileInfoModal.file?.has_thumb">
                        <img :src="`/s/${shareToken}/file/${fileInfoModal.file.id}/thumb`"
                            class="w-full h-full object-cover absolute inset-0 z-10">
                    </template>
                    <template x-if="!fileInfoModal.file?.has_thumb">
                        <div x-html="fileInfoModal.svgIcon"></div>
                    </template>
                </div>
                <div class="flex-1 min-w-0 pt-1">
                    <h3 class="text-lg font-bold text-slate-900 dark:text-white truncate"
                        x-text="fileInfoModal.file?.filename" :title="fileInfoModal.file?.filename"></h3>
                    <p class="text-slate-500 dark:text-slate-400 text-sm font-medium mt-0.5"
                        x-text="t(fileInfoModal.typeName) + (fileInfoModal.ext ? ' (' + fileInfoModal.ext + ')' : '')">
                    </p>
                </div>

                <button @click="closeFileInfoModal()"
                    class="p-1.5 text-slate-400 hover:text-slate-700 dark:hover:text-white hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors shrink-0">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <!-- Scrollable Content -->
            <div class="flex-1 overflow-y-auto p-6 pt-4 hide-scrollbar">

                <div id="media-preview-container"
                    class="w-full flex items-center justify-center p-1.5 min-h-[200px] relative overflow-hidden bg-slate-50/30 dark:bg-slate-900/10 rounded-2xl mt-4 mb-2 min-w-0"
                    x-show="fileInfoModal.isMedia && (!fileInfoModal.tooLarge || fileInfoModal.bypassWarning)"
                    @click="if($event.target.tagName==='IMG' && $event.target.dataset.lightboxSrc) { const file = files.find(f => String(f.id) === String($event.target.dataset.lightboxId)); openImageViewer($event.target.dataset.lightboxSrc, $event.target.dataset.lightboxName, file); }">

                    <!-- Loading Placeholder -->
                    <div x-show="(!fileInfoModal.tooLarge || fileInfoModal.bypassWarning) && !fileInfoModal.needsLoad && !fileInfoModal.unsupportedMedia"
                        x-cloak
                        class="absolute inset-0 flex flex-col items-center justify-center gap-3 animate-pulse text-slate-300 dark:text-slate-700">
                        <i class="fa-solid fa-circle-notch fa-spin text-3xl"></i>
                        <p class="text-[10px] font-medium tracking-widest uppercase" x-text="t('loading')"></p>
                    </div>

                    <template x-if="(!fileInfoModal.tooLarge || fileInfoModal.bypassWarning) && (fileInfoModal.typeName !== 'type_video' && fileInfoModal.typeName !== 'type_audio')">
                        <div x-html="fileInfoModal.mediaHtml" class="relative z-10 w-full min-w-0 flex justify-center">
                        </div>
                    </template>

                    <template x-if="(!fileInfoModal.tooLarge || fileInfoModal.bypassWarning) && (fileInfoModal.typeName === 'type_video' || fileInfoModal.typeName === 'type_audio')">
                        <div class="relative w-full aspect-video rounded-2xl overflow-hidden group cursor-pointer border border-slate-200/50 dark:border-slate-800 shadow-md"
                            @click="openMediaPlayer(fileInfoModal.file)">
                            <!-- Poster Image / fallback -->
                            <template x-if="fileInfoModal.file?.has_thumb">
                                <img :src="`/s/${shareToken}/file/${fileInfoModal.file.id}/thumb`"
                                    class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
                            </template>
                            <template x-if="!fileInfoModal.file?.has_thumb">
                                <div class="w-full h-full bg-gradient-to-br from-slate-800 to-slate-950 flex flex-col items-center justify-center gap-3">
                                    <i class="text-5xl" :class="fileInfoModal.typeName === 'type_video' ? 'fa-solid fa-film text-purple-400' : 'fa-solid fa-music text-amber-400'"></i>
                                    <span class="text-xs text-slate-400 font-semibold uppercase tracking-wider" x-text="fileInfoModal.typeName === 'type_video' ? t('video_only') : t('type_audio')"></span>
                                </div>
                            </template>
                            
                            <!-- Glassmorphic Play button -->
                            <div class="absolute inset-0 bg-slate-950/40 opacity-90 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center">
                                <div class="w-16 h-16 rounded-full bg-white/20 backdrop-blur-md border border-white/30 flex items-center justify-center shadow-lg group-hover:scale-110 group-hover:bg-white/30 transition-all duration-300">
                                    <i class="fa-solid fa-play text-2xl text-white ml-1"></i>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- Video Subtitle Help Hint -->
                <template
                    x-if="fileInfoModal.isMedia && fileInfoModal.file && fileInfoModal.typeName === 'type_video' && (!fileInfoModal.tooLarge || fileInfoModal.bypassWarning)">
                    <div
                        class="mt-2 mb-2 p-3 rounded-2xl bg-amber-50 dark:bg-amber-950/20 border border-amber-100 dark:border-amber-900/30 text-[11px] text-amber-800 dark:text-amber-400 leading-normal flex items-start gap-2 shadow-sm animate-fade-in w-full z-10">
                        <i class="fa-solid fa-lightbulb mt-0.5 shrink-0 text-amber-500 text-sm"></i>
                        <div>
                            <span class="font-bold block text-slate-800 dark:text-slate-200 mb-0.5"
                                x-text="t('subtitles')"></span>
                            <span x-text="t('subtitles_help_share_folder')"></span>
                        </div>
                    </div>
                </template>

                <!-- Fullscreen button (only for images, outside x-html) -->
                <template
                    x-if="fileInfoModal.isMedia && fileInfoModal.file && fileInfoModal.typeName === 'type_image' && (!fileInfoModal.tooLarge || fileInfoModal.bypassWarning)">
                    <button
                        @click="openImageViewer(`/s/${shareToken}/file/${fileInfoModal.file.id}/stream`, fileInfoModal.file.filename, fileInfoModal.file)"
                        :title="t('view_fullscreen')"
                        class="w-full mt-1 mb-1 flex items-center justify-center gap-2 px-4 py-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 text-sm font-medium transition-all">
                        <i class="fa-solid fa-expand text-sm"></i>
                        <span x-text="t('view_fullscreen')"></span>
                    </button>
                </template>

                <div x-show="fileInfoModal.needsLoad && (!fileInfoModal.tooLarge || fileInfoModal.bypassWarning)"
                    class="w-full mt-4 mb-2">
                    <div
                        class="w-full p-6 flex flex-col items-center justify-center bg-slate-50 dark:bg-slate-800/30 rounded-2xl border border-dashed border-slate-300 dark:border-slate-700">
                        <i class="fa-solid fa-file-lines text-4xl text-slate-300 dark:text-slate-600 mb-3"></i>
                        <p class="text-sm text-slate-500 mb-4 text-center" x-text="t('preview_manual')"></p>
                        <button @click="loadFilePreview()"
                            class="px-6 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-xl text-sm font-semibold transition-all shadow-lg shadow-blue-500/20 active:scale-95">
                            <span x-text="t('load_preview')"></span>
                        </button>
                    </div>
                </div>

                <div x-show="fileInfoModal.tooLarge" class="w-full mt-4 mb-2">
                    <div
                        class="w-full p-6 flex flex-col items-center justify-center bg-rose-50 dark:bg-rose-500/10 rounded-2xl border border-dashed border-rose-200 dark:border-rose-500/30 animate-fade-in text-center">
                        <i class="fa-solid fa-circle-xmark text-4xl text-rose-500 mb-3 animate-pulse"></i>
                        <p class="text-sm text-rose-800 dark:text-rose-400 mb-2 font-bold"
                            x-text="t('preview_blocked')"></p>
                        <p class="text-xs text-rose-600 dark:text-rose-500/80 mb-4"
                            x-text="t('preview_blocked_desc') || 'Vui lòng tải xuống tệp tin để xem toàn bộ nội dung.'">
                        </p>
                        <button @click="startDownload(fileInfoModal.file?.id)"
                            class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-xs font-bold transition-all transform active:scale-95 shadow-lg shadow-blue-500/25">
                            <i class="fa-solid fa-download mr-1"></i><span x-text="t('download')"></span>
                        </button>
                    </div>
                </div>

                <div x-show="fileInfoModal.isPreviewLoading"
                    class="w-full mt-6 mb-4 flex flex-col items-center justify-center py-10">
                    <i class="fa-solid fa-circle-notch fa-spin text-3xl text-blue-500 mb-3"></i>
                    <p class="text-sm text-slate-500" x-text="t('loading_preview')"></p>
                </div>

                <div
                    class="space-y-3 mt-5 bg-white/50 dark:bg-slate-900/50 p-4 rounded-xl border border-slate-200 dark:border-slate-700/50">
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-500 dark:text-slate-400" x-text="t('size') + ':'"></span>
                        <span class="font-semibold text-slate-800 dark:text-slate-200"
                            x-text="formatBytes(fileInfoModal.file?.size)"></span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-500 dark:text-slate-400" x-text="t('date') + ':'"></span>
                        <span class="font-semibold text-slate-800 dark:text-slate-200"
                            x-text="formatDate(fileInfoModal.file?.created_at)"></span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-500 dark:text-slate-400" x-text="t('status') + ':'"></span>
                        <span class="font-semibold text-emerald-600 dark:text-emerald-400" x-text="t('public')"></span>
                    </div>
                </div>

                <p
                    class="text-center text-[10px] text-slate-400 dark:text-slate-500 mt-4 flex items-center justify-center gap-1.5 opacity-70">
                    <i class="fa-solid fa-shield-halved text-emerald-500 text-xs"></i>
                    <span x-text="t('safe_msg')"></span>
                </p>

                <div class="mt-4 flex flex-col gap-1.5">
                    <!-- Comic Reader Button -->
                    <template
                        x-if="fileInfoModal.typeName === 'type_comic' && (!fileInfoModal.tooLarge || fileInfoModal.bypassWarning)">
                        <button @click="openComicViewer(fileInfoModal.file); closeFileInfoModal()"
                            class="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl bg-violet-600 hover:bg-violet-500 text-white font-bold shadow-lg shadow-violet-500/25 transition-all duration-300 transform active:scale-95">
                            <i class="fa-solid fa-book-open"></i> <span x-text="t('comic_reader')"></span>
                        </button>
                    </template>

                    <!-- EPUB Reader Button -->
                    <template
                        x-if="fileInfoModal.typeName === 'type_epub' && (!fileInfoModal.tooLarge || fileInfoModal.bypassWarning)">
                        <button @click="openEpubViewer(fileInfoModal.file); closeFileInfoModal()"
                            class="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl bg-emerald-600 hover:bg-emerald-500 text-white font-bold shadow-lg shadow-emerald-500/25 transition-all duration-300 transform active:scale-95">
                            <i class="fa-solid fa-book"></i> <span x-text="t('epub_reader')"></span>
                        </button>
                    </template>

                    <!-- PDF Reader Button -->
                    <template
                        x-if="fileInfoModal.typeName === 'type_pdf' && (!fileInfoModal.tooLarge || fileInfoModal.bypassWarning)">
                        <button @click="openPdfViewer(fileInfoModal.file); closeFileInfoModal()"
                            class="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl bg-red-600 hover:bg-red-500 text-white font-bold shadow-lg shadow-red-500/25 transition-all duration-300 transform active:scale-95">
                            <i class="fa-solid fa-file-pdf"></i> <span x-text="t('pdf_reader')"></span>
                        </button>
                    </template>

                    <!-- Premium Play Button for Video/Audio -->
                    <template x-if="(fileInfoModal.typeName === 'type_video' || fileInfoModal.typeName === 'type_audio') && (!fileInfoModal.tooLarge || fileInfoModal.bypassWarning)">
                        <button @click="openMediaPlayer(fileInfoModal.file)"
                            class="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl bg-purple-600 hover:bg-purple-500 text-white font-bold shadow-lg shadow-purple-500/25 transition-all duration-300 transform active:scale-95">
                            <i class="fa-solid fa-play"></i>
                            <span x-text="t('play')"></span>
                        </button>
                    </template>

                    <button @click="startDownload(fileInfoModal.file?.id); closeFileInfoModal()"
                        class="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-medium shadow-lg shadow-blue-500/25 transition-transform active:scale-95">
                        <i class="fa-solid fa-download"></i> <span x-text="t('download')"></span>
                    </button>
                    <button @click="closeFileInfoModal()"
                        class="w-full mt-3 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 text-slate-500 dark:text-slate-400 font-medium transition-all text-xs">
                        <span x-text="t('close')"></span>
                    </button>
                </div>
            </div> <!-- Closes Scrollable Content -->
        </div>
    </div>

    <!-- ===== Image Fullscreen Lightbox ===== -->
    <!-- ===== Image Fullscreen Lightbox ===== -->
    <div x-show="imageViewer.show" x-cloak
        class="fixed inset-0 z-[500] flex items-center justify-center bg-black/95 backdrop-blur-md transition-all duration-300"
        :class="!lightboxControlsVisible ? 'cursor-none' : 'cursor-zoom-out'"
        x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
        @keydown.escape.window="imageViewer.show = false" @keydown.left.window="if(imageViewer.show) prevImage()"
        @keydown.right.window="if(imageViewer.show) nextImage()" @mousemove="resetLightboxControlsTimeout()"
        @click="resetLightboxControlsTimeout()" @touchstart="resetLightboxControlsTimeout()">

        <!-- Loading Spinner -->
        <div x-show="lightboxLoading"
            class="absolute inset-0 flex flex-col items-center justify-center gap-3 text-white/50">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl"></i>
            <p class="text-xs font-medium tracking-widest uppercase" x-text="t('loading')"></p>
        </div>

        <!-- Navigation Buttons -->
        <template
            x-if="imageViewer.show && (imageViewer.isSlideshow ? imageViewer.slideshowFiles.length > 1 : imageFiles.length > 1)">
            <div>
                <button @click.stop="prevImage()"
                    class="absolute left-4 top-1/2 -translate-y-1/2 z-10 p-4 rounded-full bg-white-pure-10 hover:bg-white-pure-20 text-white transition-all duration-300 backdrop-blur-sm shadow-lg hover:scale-105 active:scale-95 cursor-pointer"
                    :class="!lightboxControlsVisible ? 'opacity-0 pointer-events-none' : 'opacity-100'">
                    <i class="fa-solid fa-chevron-left text-2xl"></i>
                </button>
                <button @click.stop="nextImage()"
                    class="absolute right-4 top-1/2 -translate-y-1/2 z-10 p-4 rounded-full bg-white-pure-10 hover:bg-white-pure-20 text-white transition-all duration-300 backdrop-blur-sm shadow-lg hover:scale-105 active:scale-95 cursor-pointer"
                    :class="!lightboxControlsVisible ? 'opacity-0 pointer-events-none' : 'opacity-100'">
                    <i class="fa-solid fa-chevron-right text-2xl"></i>
                </button>
            </div>
        </template>

        <!-- Close button -->
        <button @click="imageViewer.show = false"
            class="absolute top-4 right-4 z-10 p-3 rounded-full bg-white-pure-10 hover:bg-white-pure-20 text-white transition-all duration-300 backdrop-blur-sm shadow-lg cursor-pointer"
            :class="!lightboxControlsVisible ? 'opacity-0 pointer-events-none' : 'opacity-100'">
            <i class="fa-solid fa-xmark text-xl"></i>
        </button>

        <!-- Filename -->
        <div class="absolute top-4 left-4 right-16 z-10 pointer-events-none transition-all duration-300"
            :class="!lightboxControlsVisible ? 'opacity-0' : 'opacity-100'">
            <p class="text-white/70 text-sm font-medium truncate drop-shadow" x-text="imageViewer.filename"></p>
        </div>

        <!-- Download button -->
        <a :href="imageViewer.src" download :title="t('download')"
            class="absolute bottom-4 right-4 z-10 p-3 rounded-full bg-white-pure-10 hover:bg-white-pure-20 text-white transition-all duration-300 backdrop-blur-sm shadow-lg cursor-pointer"
            :class="!lightboxControlsVisible ? 'opacity-0 pointer-events-none' : 'opacity-100'">
            <i class="fa-solid fa-download text-lg"></i>
        </a>

        <!-- Slideshow Controls -->
        <template x-if="imageViewer.show && imageViewer.isSlideshow">
            <div class="absolute bottom-4 left-1/2 -translate-x-1/2 z-10 flex items-center flex-nowrap whitespace-nowrap gap-2 sm:gap-3 px-3 sm:px-4 py-2 rounded-full bg-black/60 backdrop-blur-md border border-white/10 shadow-lg text-white transition-all duration-300"
                @click.stop :class="!lightboxControlsVisible ? 'opacity-0 pointer-events-none' : 'opacity-100'">
                <button @click.stop="toggleSlideshow()"
                    class="p-2 hover:bg-white-pure-10 rounded-full transition-colors flex-shrink-0"
                    :title="imageViewer.slideshowInterval ? t('pause') : t('play')">
                    <i class="fa-solid text-sm" :class="imageViewer.slideshowInterval ? 'fa-pause' : 'fa-play'"></i>
                </button>
                <div class="h-4 w-px bg-white/25 flex-shrink-0"></div>
                <span class="text-xs text-white/70 font-mono whitespace-nowrap flex-shrink-0"
                    x-text="`${imageViewer.slideshowIndex + 1} / ${imageViewer.slideshowFiles.length}`"></span>
                <div class="h-4 w-px bg-white/25 flex-shrink-0"></div>
                <button @click.stop="
                    const speeds = [5000, 8000, 10000, 15000];
                    const i = speeds.indexOf(imageViewer.slideshowSpeed);

            </footer>

    </div>



    <div x-show="selectedIds.length > 0" x-cloak
        class="fixed bottom-[calc(5rem+env(safe-area-inset-bottom))] md:bottom-8 left-1/2 -translate-x-1/2 glass-menu px-3 py-3 rounded-full shadow-[0_20px_40px_rgba(0,0,0,0.2)] dark:shadow-[0_20px_40px_rgba(0,0,0,0.8)] flex items-center gap-2 md:gap-6 z-[55] md:z-50 border border-slate-200 dark:border-slate-700/50"

        <div class="flex items-center gap-4">
            <div
                class="w-12 h-12 rounded-2xl bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center shrink-0">
                <i class="fa-solid fa-cloud-arrow-down text-blue-600 dark:text-blue-400 text-xl animate-bounce"></i>
            </div>
            <div class="flex-1 min-w-0">

            <div class="w-16 h-16 rounded-full flex items-center justify-center mb-4 shadow-inner"

                <i class="fa-solid text-3xl" :class="toastModal.type === 'error' ? 'fa-xmark' : 'fa-check'"></i>

            <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2"

            <button x-show="!toastModal.persistent" @click="toastModal.show = false"

                x-text="t('close')">
            </button>
        </div>
    </div>

    <!-- ==================== IMMERSIVE MEDIA PLAYER MODAL (Cinema Mode) ==================== -->
    <div x-show="mediaPlayerModal.show" x-cloak
        :class="mediaPlayerModal.minimized 
            ? (mediaPlayerModal.bubbleMode
                ? 'media-player-minimized immersive-player-modal fixed bottom-6 right-4 md:right-6 z-[600] w-14 h-14 rounded-full bg-slate-950/95 border border-purple-500/40 shadow-2xl select-none flex items-center justify-center transition-all duration-300 pointer-events-auto cursor-grab active:cursor-grabbing hover:scale-105 hover:border-purple-500/60 shadow-purple-500/10'
                : 'media-player-minimized immersive-player-modal fixed bottom-6 right-4 md:right-6 z-[600] w-[calc(100%-2rem)] max-w-[340px] md:w-[380px] rounded-2xl bg-slate-950/95 backdrop-blur-xl border border-purple-500/30 shadow-2xl select-none flex flex-col overflow-hidden transition-all duration-300 pointer-events-auto hover:border-purple-500/50 hover:shadow-purple-500/10')
            : 'immersive-player-modal fixed inset-0 z-[600] flex flex-col bg-slate-950/98 backdrop-blur-xl select-none transition-all duration-300'"

        x-transition:enter-end="opacity-100 scale-100" x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95"
        @keyup.window.escape="mediaPlayerModal.show && !mediaPlayerModal.minimized && closeMediaPlayerModal()">

        <div x-show="!mediaPlayerModal.minimized" class="absolute inset-0 bg-gradient-to-b from-blue-500/5 via-transparent to-black/40 pointer-events-none"></div>

        <!-- Top Header Panel (Glassmorphism) -->
        <header x-show="!mediaPlayerModal.minimized || !mediaPlayerModal.bubbleMode"
            @mousedown="startDrag($event)" @touchstart="startDrag($event)"
            :class="mediaPlayerModal.minimized ? 'relative z-20 flex items-center justify-between p-3 bg-slate-900/60 backdrop-blur-md border-b border-white/5 shadow-md gap-4 cursor-grab active:cursor-grabbing' : 'relative z-20 flex items-center justify-between p-4 bg-slate-900/40 backdrop-blur-md border-b border-white/5 shadow-lg gap-4'">
            <div class="flex items-center gap-3 min-w-0">
                <div class="w-8 h-8 rounded-lg flex items-center justify-center shrink-0"
                     :class="mediaPlayerModal.isAudio ? 'bg-amber-500/20 text-amber-400' : 'bg-purple-500/20 text-purple-400'">
                    <i :class="mediaPlayerModal.isAudio ? 'fa-solid fa-music' : 'fa-solid fa-film'"></i>
                </div>
                <div class="min-w-0">
                    <h3 class="text-sm font-bold text-white truncate" x-text="mediaPlayerModal.file?.filename"></h3>
                    <p x-show="!mediaPlayerModal.minimized" class="text-[10px] text-slate-400 font-medium mt-0.5" x-text="formatBytes(mediaPlayerModal.file?.size)"></p>
                </div>
            </div>

            <div class="flex items-center gap-1 shrink-0">
                <!-- Previous Button (when NOT minimized) -->
                <button x-show="!mediaPlayerModal.minimized" @click="playPrevTrack()"
                    class="p-2 text-slate-400 hover:text-white hover:bg-white/10 rounded-full transition-colors shrink-0"
                    :title="t('prev_track_tooltip')">
                    <i class="fa-solid fa-backward-step"></i>
                </button>
                <!-- Next Button (when NOT minimized) -->
                <button x-show="!mediaPlayerModal.minimized" @click="playNextTrack()"
                    class="p-2 text-slate-400 hover:text-white hover:bg-white/10 rounded-full transition-colors shrink-0"
                    :title="t('next_track_tooltip')">
                    <i class="fa-solid fa-forward-step"></i>
                </button>
                <!-- Playlist Sidebar Toggle Button -->
                <button @click="mediaPlayerModal.playlistOpen = !mediaPlayerModal.playlistOpen"
                    class="p-2 rounded-full transition-colors shrink-0"
                    :class="mediaPlayerModal.playlistOpen ? 'text-amber-400 bg-white/15' : 'text-slate-400 hover:text-white hover:bg-white/10'"
                    :title="t('playlist_tooltip')">
                    <i class="fa-solid fa-list"></i>
                </button>

                <!-- Collapse to Bubble Button (only when minimized) -->
                <button x-show="mediaPlayerModal.minimized" @click="mediaPlayerModal.bubbleMode = true"
                    class="p-2 text-slate-400 hover:text-white hover:bg-white/10 rounded-full transition-colors shrink-0"
                    :title="t('bubble_mode_tooltip') || 'Bubble Mode'">
                    <i class="fa-regular fa-circle text-xs"></i>
                </button>

                <!-- Minimize/Restore Button (always visible) -->
                <button @click="mediaPlayerModal.minimized = !mediaPlayerModal.minimized"
                    class="p-2 text-slate-400 hover:text-white hover:bg-white/10 rounded-full transition-colors shrink-0"
                    :title="mediaPlayerModal.minimized ? t('maximize') : t('minimize')">
                    <i class="fa-solid" :class="mediaPlayerModal.minimized ? 'fa-expand' : 'fa-compress'"></i>
                </button>



                <!-- Close Button (only visible when minimized) -->
                <button x-show="mediaPlayerModal.minimized" @click="closeMediaPlayerModal()"
                    class="p-2 text-slate-400 hover:text-white hover:bg-white/10 rounded-full transition-colors shrink-0"
                    :title="t('close')">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
        </header>

        <!-- Media Player Stage -->
        <div x-show="!mediaPlayerModal.minimized || !mediaPlayerModal.bubbleMode"
            :class="mediaPlayerModal.minimized ? 'p-0 flex-none' : 'flex-1 flex items-stretch p-0 relative z-10 overflow-hidden h-[calc(100%-64px)] md:h-[calc(100%-68px)]'">

            <div :class="mediaPlayerModal.minimized ? 'w-full' : 'flex-1 flex items-center justify-center p-4 min-w-0 overflow-y-auto'">

                    <div id="cinema-video-player" class="w-full h-full"></div>

                <div x-show="mediaPlayerModal.isAudio" 
                     :class="mediaPlayerModal.minimized ? 'w-full p-4 flex flex-col gap-3 bg-slate-900/40 backdrop-blur-md rounded-b-2xl border-t border-white/5' : 'w-full max-w-md p-6 glass-panel rounded-3xl border border-white/10 shadow-2xl text-center flex flex-col items-center gap-6'">
                    
                    <!-- Vinyl & Title info container -->

                            <template x-if="!mediaPlayerModal.file?.has_thumb">
                                <div class="w-full h-full flex items-center justify-center bg-slate-950 animate-[spin_20s_linear_infinite]"
                                     :style="mediaPlayerModal.isPlaying ? 'animation-play-state: running' : 'animation-play-state: paused'">
                                    <i class="fa-solid fa-compact-disc text-amber-500/80" :class="mediaPlayerModal.minimized ? 'text-2xl' : 'text-8xl'"></i>
                                </div>

                            <div class="absolute inset-0 m-auto rounded-full bg-slate-950 border border-slate-900 flex items-center justify-center z-20 transition-all duration-300"

                            <h4 class="font-bold text-white truncate" :class="mediaPlayerModal.minimized ? 'text-xs' : 'text-base'" x-text="mediaPlayerModal.file?.filename"></h4>
                            <p class="text-slate-400 mt-1" :class="mediaPlayerModal.minimized ? 'text-[10px]' : 'text-xs'" x-text="t('audio_player')"></p>
                        </div>
                    </div>

                    <div class="w-full relative z-20 rounded-2xl p-2 bg-slate-950/40 border border-white/5 transition-all duration-300"
                         :class="mediaPlayerModal.minimized ? 'p-1 rounded-xl' : 'p-2 rounded-2xl'">
                        <audio id="cinema-audio-player" controls preload="none" class="w-full"></audio>
                    </div>
                </div>
            </div>

            <!-- Right Sidebar Playlist (Glassmorphism, Scroll-friendly) -->
            <div x-show="!mediaPlayerModal.minimized && mediaPlayerModal.playlistOpen"
                 x-transition:enter="transition ease-out duration-300 transform"
                 x-transition:enter-start="translate-x-full"
                 x-transition:enter-end="translate-x-0"
                 x-transition:leave="transition ease-in duration-200 transform"
                 x-transition:leave-start="translate-x-0"
                 x-transition:leave-end="translate-x-full"
                 class="w-[320px] max-w-full shrink-0 border-l border-white/5 bg-slate-950/40 backdrop-blur-md flex flex-col h-full overflow-hidden">
                <!-- Sidebar Header -->
                <div class="p-4 border-b border-white/5 flex items-center justify-between">
                    <span class="text-xs font-bold text-white flex items-center gap-2">
                        <i class="fa-solid fa-circle-play text-amber-500 animate-pulse"></i>
                        <span x-text="t('playlist')"></span>
                    </span>
                    <span class="text-[10px] text-slate-400 font-semibold bg-white/10 px-2 py-0.5 rounded-full" x-text="mediaPlayerModal.playlist.length + ' ' + t('files_suffix')"></span>

                <!-- Sidebar Playlist Container -->
                <div class="flex-1 overflow-y-auto p-2 space-y-1 custom-scrollbar"
                     x-effect="if (!mediaPlayerModal.minimized && mediaPlayerModal.playlistOpen && mediaPlayerModal.playlistIndex !== -1) {
                         $nextTick(() => {
                             const activeEl = $el.querySelector('.bg-white\\/10');
                             if (activeEl) {
                                 activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                             }
                         });
                     }">
                    <template x-for="(f, index) in mediaPlayerModal.playlist" :key="f.id">

                                        <div class="w-[3px] bg-amber-400 rounded-full eq-bar animate-eq-wave-3"></div>

                                </template>
                                <template x-if="!(index === mediaPlayerModal.playlistIndex && mediaPlayerModal.isPlaying)">
                                    <i :class="['mp3', 'wav', 'ogg', 'm4a', 'flac', 'opus', 'oga', 'aac', 'm4b'].includes(f.filename.split('.').pop().toLowerCase()) ? 'fa-solid fa-music text-amber-500/80' : 'fa-solid fa-film text-purple-500/80'"></i>
                                </template>
                            </div>

                            <!-- Track details -->
                            <div class="min-w-0 flex-1">
                                <p class="truncate text-[11px] font-semibold" :class="index === mediaPlayerModal.playlistIndex ? 'text-white' : 'text-slate-300 group-hover:text-white'" x-text="f.filename"></p>
                                <p class="text-[9px] text-slate-500 mt-0.5" x-text="formatBytes(f.size)"></p>
                            </div>

                            <!-- Indicator icon -->
                            <div class="shrink-0 opacity-0 group-hover:opacity-100 transition-opacity" :class="index === mediaPlayerModal.playlistIndex ? 'opacity-100 text-amber-400' : 'text-slate-500'">
                                <i class="fa-solid" :class="index === mediaPlayerModal.playlistIndex ? 'fa-volume-high' : 'fa-play'"></i>
                            </div>
                        </button>
                    </template>
                </div>
            </div>
        </div>

        <!-- Compact Playlist for Minimized Player (Miniplayer) -->
        <div x-show="mediaPlayerModal.minimized && mediaPlayerModal.playlistOpen && !mediaPlayerModal.bubbleMode"
             class="miniplayer-playlist border-t border-white/5 bg-slate-950/80 backdrop-blur-md flex flex-col max-h-[160px] overflow-y-auto custom-scrollbar shrink-0"
             x-effect="if (mediaPlayerModal.minimized && mediaPlayerModal.playlistOpen && mediaPlayerModal.playlistIndex !== -1) {
                 $nextTick(() => {
                     const activeEl = $el.querySelector('.active-mini-track');
                     if (activeEl) {
                         activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                     }
                 });
             }">
            <template x-for="(f, index) in mediaPlayerModal.playlist" :key="f.id">
                <button @click="playTrackByIndex(index)"
                    class="miniplayer-playlist-item w-full flex items-center gap-2.5 p-2 transition-all text-left text-[11px] outline-none border-b border-white/5 last:border-b-0"
                    :class="index === mediaPlayerModal.playlistIndex 
                        ? 'bg-blue-600/20 text-blue-400 font-bold border-l-2 border-blue-500 active-mini-track' 
                        : 'text-slate-300 hover:bg-white/5'">
                    <i class="fa-solid shrink-0" :class="['mp3', 'wav', 'ogg', 'm4a', 'flac', 'opus', 'oga', 'aac', 'm4b'].includes(f.filename.split('.').pop().toLowerCase()) ? 'fa-music text-amber-500/80' : 'fa-film text-purple-500/80'"></i>
                    <span class="truncate flex-1" x-text="f.filename"></span>
                    <span class="text-[9px] text-slate-500 shrink-0" x-text="formatBytes(f.size)"></span>
                </button>
            </template>
        </div>

        <!-- Floating Bubble Mode UI -->
        <div x-show="mediaPlayerModal.minimized && mediaPlayerModal.bubbleMode"
             class="w-full h-full flex items-center justify-center relative cursor-grab active:cursor-grabbing"
             @click="if (!mediaPlayerModal.isDragging) { mediaPlayerModal.bubbleMode = false; }"
             @mousedown="startDrag($event)"
             @touchstart="startDrag($event)">
             
             <!-- CD/Vinyl artwork spinning if audio, or film icon if video -->
             <div class="relative w-12 h-12 rounded-full overflow-hidden border border-white/10 bg-slate-900 flex items-center justify-center shadow-lg transition-transform duration-300 hover:scale-105">
                 <template x-if="mediaPlayerModal.isAudio">
                     <!-- Spinning CD -->
                     <div class="w-full h-full relative flex items-center justify-center">
                         <template x-if="mediaPlayerModal.file?.has_thumb">
                             <img :src="mediaPlayerModal.file?.id ? '/s/' + shareToken + '/file/' + mediaPlayerModal.file.id + '/thumb' : ''"
                                  class="w-full h-full object-cover animate-[spin_20s_linear_infinite]"
                                  :style="mediaPlayerModal.isPlaying ? 'animation-play-state: running' : 'animation-play-state: paused'">
                         </template>
                         <template x-if="!mediaPlayerModal.file?.has_thumb">
                             <div class="w-full h-full flex items-center justify-center bg-slate-950 animate-[spin_20s_linear_infinite]"
                                  :style="mediaPlayerModal.isPlaying ? 'animation-play-state: running' : 'animation-play-state: paused'">
                                 <i class="fa-solid fa-compact-disc text-amber-500/80 text-xl"></i>
                             </div>
                         </template>
                         <!-- Center spindle hole -->
                         <div class="absolute inset-0 m-auto w-2 h-2 rounded-full bg-slate-950 border border-slate-900 flex items-center justify-center z-20">
                             <div class="w-0.5 h-0.5 rounded-full bg-slate-800"></div>
                         </div>
                     </div>
                 </template>
                 <template x-if="!mediaPlayerModal.isAudio">
                     <!-- Film / Video Icon -->
                     <div class="w-full h-full flex items-center justify-center bg-slate-950 relative">
                         <!-- Pulsing ring if playing -->
                         <div x-show="mediaPlayerModal.isPlaying" class="absolute inset-0 rounded-full border border-purple-500 animate-ping opacity-60"></div>
                         <i class="fa-solid fa-film text-purple-500/90 text-lg"></i>
                     </div>
                 </template>
             </div>
             
             <!-- Badge/Indicator for playing state -->
             <div class="absolute -top-0.5 -right-0.5 w-3.5 h-3.5 rounded-full flex items-center justify-center text-[8px] border border-slate-950 shadow"
                  :class="mediaPlayerModal.isPlaying ? 'bg-green-500 animate-pulse' : 'bg-slate-500'">
                  <i class="fa-solid" :class="mediaPlayerModal.isPlaying ? 'fa-play text-[5px] text-white pl-[1px]' : 'fa-pause text-[5px] text-white'"></i>
             </div>
        </div>
    </div>

    <!-- ==================== COMIC READER MODAL ==================== -->
    <div x-show="comicViewer.show" x-cloak
        class="fixed inset-0 z-[600] flex flex-col bg-slate-950/98 backdrop-blur-md select-none"
        x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 scale-95"
        x-transition:enter-end="opacity-100 scale-100" x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95"
        @keyup.window.right="comicViewer.scrollMode === 'page' && (comicViewer.direction === 'rtl' ? prevComicPage() : nextComicPage())"
        @keyup.window.left="comicViewer.scrollMode === 'page' && (comicViewer.direction === 'rtl' ? nextComicPage() : prevComicPage())"
        @keyup.window.escape="comicViewer.show && closeComicViewer()">

        <!-- Ambient Glow behind content -->
        <div
            class="absolute inset-0 bg-gradient-to-b from-purple-500/10 via-transparent to-black/30 pointer-events-none">
        </div>

        <!-- Top Header Panel (Glassmorphism) -->
        <header
            class="relative z-20 flex items-center justify-between p-4 bg-slate-900/40 backdrop-blur-md border-b border-white/5 shadow-lg gap-4">
            <div class="flex items-center gap-3 min-w-0">
                <div
                    class="w-8 h-8 rounded-lg bg-violet-500/20 flex items-center justify-center text-violet-400 shrink-0">
                    <i class="fa-solid fa-book-open text-sm"></i>
                </div>
                <div class="min-w-0">
                    <h3 class="text-white text-sm sm:text-base font-bold truncate" x-text="comicViewer.file?.filename">
                    </h3>
                    <p class="text-slate-400 text-xs mt-0.5" x-text="t('comic_reader')"></p>
                </div>
            </div>

            <!-- Page Count and Controls -->
            <div class="flex items-center gap-2 sm:gap-4 shrink-0">
                <!-- Page counter -->
                <div x-show="comicViewer.pages.length > 0"
                    class="px-3 py-1 bg-white/5 border border-white/10 rounded-full text-slate-300 text-xs font-bold font-mono tracking-wider">
                    <span>
                        <span class="text-violet-400" x-text="comicViewer.currentPageIndex + 1"></span>
                        <span class="text-slate-500">/</span>
                    </span>
                    <span x-text="comicViewer.pages.length"></span>
                </div>

                <!-- Desktop-only Inline Controls -->
                <div class="hidden sm:flex items-center gap-2 sm:gap-4">
                    <!-- Direction Selector Dropdown -->
                    <div class="flex items-center gap-1 bg-white/5 border border-white/10 rounded-xl p-1"
                        x-show="comicViewer.scrollMode === 'page'">
                        <button @click.stop="setComicDirection('ltr')"
                            class="px-2 py-1 text-[10px] font-bold rounded-lg transition-all"
                            :class="comicViewer.direction === 'ltr' ? 'bg-violet-500 text-white shadow-sm' : 'text-slate-300 hover:text-white'"
                            title="Left to Right">
                            LTR
                        </button>
                        <button @click.stop="setComicDirection('rtl')"
                            class="px-2 py-1 text-[10px] font-bold rounded-lg transition-all"
                            :class="comicViewer.direction === 'rtl' ? 'bg-violet-500 text-white shadow-sm' : 'text-slate-300 hover:text-white'"
                            title="Right to Left (Manga)">
                            RTL
                        </button>
                    </div>

                    <!-- View Mode Selector -->
                    <select @change="setComicViewMode($event.target.value)" :value="comicViewer.viewMode || 'single'"
                        x-show="comicViewer.scrollMode === 'page'"
                        class="px-2 py-1.5 text-xs font-bold bg-slate-900 border border-white/10 text-white rounded-xl focus:outline-none cursor-pointer">
                        <option value="single" x-text="t('comic_view_single') || 'Single'"></option>
                        <option value="double" x-text="t('comic_view_double') || 'Double'"></option>
                    </select>

                    <!-- Filter Selector -->
                    <select @change="setComicFilter($event.target.value)" :value="comicViewer.filter || 'none'"
                        class="px-2 py-1.5 text-xs font-bold bg-slate-900 border border-white/10 text-white rounded-xl focus:outline-none cursor-pointer">
                        <option value="none" x-text="t('comic_filter_none') || 'No Filter'"></option>
                        <option value="eye-care" x-text="t('comic_filter_eyecare') || 'Eye Care'"></option>
                        <option value="sepia" x-text="t('comic_filter_sepia') || 'Sepia'"></option>
                        <option value="contrast" x-text="t('comic_filter_contrast') || 'High Contrast'"></option>
                        <option value="grayscale" x-text="t('comic_filter_grayscale') || 'Grayscale'"></option>
                    </select>

                    <!-- Scroll Mode Toggle -->
                    <button
                        @click.stop="comicViewer.scrollMode = (comicViewer.scrollMode === 'page' ? 'continuous' : 'page')"
                        class="p-2 text-slate-300 hover:text-white bg-white/5 hover:bg-white/15 border border-white/10 rounded-xl transition-all duration-200"
                        :title="comicViewer.scrollMode === 'page' ? t('scroll_continuous') : t('scroll_page')">
                        <i class="fa-solid"
                            :class="comicViewer.scrollMode === 'page' ? 'fa-scroll' : 'fa-file-lines'"></i>
                    </button>
                </div>

                <!-- Mobile Settings Toggle -->
                <button @click.stop="comicViewer.settingsOpen = !comicViewer.settingsOpen"
                    class="sm:hidden p-2 text-slate-300 hover:text-white bg-white/5 hover:bg-white/15 border border-white/10 rounded-xl transition-all duration-200"
                    :class="comicViewer.settingsOpen ? 'text-violet-400 bg-white/10' : ''" title="Settings">
                    <i class="fa-solid fa-sliders text-sm"></i>
                </button>

                <!-- Close Button -->
                <button @click.stop="closeComicViewer()"
                    class="p-2 text-slate-400 hover:text-white bg-white/5 hover:bg-red-500 border border-white/10 rounded-xl transition-all duration-200">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
        </header>

        <!-- Collapsible Mobile Settings Toolbar -->
        <div x-show="comicViewer.settingsOpen" x-collapse
            class="sm:hidden flex flex-col gap-3 p-4 border-b border-white/5 bg-slate-900/60 backdrop-blur-md transition-all duration-200">
            
            <div class="flex flex-wrap items-center justify-between gap-3" x-show="comicViewer.scrollMode === 'page'">
                <!-- Direction Selector -->
                <div class="flex items-center gap-2">
                    <span class="text-xs text-slate-400 font-bold" x-text="t('comic_direction') || 'Direction'"></span>
                    <div class="flex items-center gap-1 bg-white/5 border border-white/10 rounded-xl p-1">
                        <button @click.stop="setComicDirection('ltr')"
                            class="px-2.5 py-1 text-[10px] font-bold rounded-lg transition-all"
                            :class="comicViewer.direction === 'ltr' ? 'bg-violet-500 text-white shadow-sm' : 'text-slate-300'"
                            title="Left to Right">
                            LTR
                        </button>
                        <button @click.stop="setComicDirection('rtl')"
                            class="px-2.5 py-1 text-[10px] font-bold rounded-lg transition-all"
                            :class="comicViewer.direction === 'rtl' ? 'bg-violet-500 text-white shadow-sm' : 'text-slate-300'"
                            title="Right to Left">
                            RTL
                        </button>
                    </div>
                </div>

                <!-- View Mode -->
                <div class="flex items-center gap-2">
                    <span class="text-xs text-slate-400 font-bold" x-text="t('comic_view_mode') || 'View Mode'"></span>
                    <select @change="setComicViewMode($event.target.value)" :value="comicViewer.viewMode || 'single'"
                        class="px-2 py-1 text-xs font-bold bg-slate-950 border border-white/10 text-white rounded-lg focus:outline-none cursor-pointer">
                        <option value="single" x-text="t('comic_view_single') || 'Single'"></option>
                        <option value="double" x-text="t('comic_view_double') || 'Double'"></option>
                    </select>
                </div>
            </div>

            <div class="flex flex-wrap items-center justify-between gap-3 border-t border-white/5 pt-3">
                <!-- Filter -->
                <div class="flex items-center gap-2">
                    <span class="text-xs text-slate-400 font-bold" x-text="t('comic_filter') || 'Filter'"></span>
                    <select @change="setComicFilter($event.target.value)" :value="comicViewer.filter || 'none'"
                        class="px-2 py-1 text-xs font-bold bg-slate-950 border border-white/10 text-white rounded-lg focus:outline-none cursor-pointer">
                        <option value="none" x-text="t('comic_filter_none') || 'No Filter'"></option>
                        <option value="eye-care" x-text="t('comic_filter_eyecare') || 'Eye Care'"></option>
                        <option value="sepia" x-text="t('comic_filter_sepia') || 'Sepia'"></option>
                        <option value="contrast" x-text="t('comic_filter_contrast') || 'High Contrast'"></option>
                        <option value="grayscale" x-text="t('comic_filter_grayscale') || 'Grayscale'"></option>
                    </select>
                </div>

                <!-- Action Controls -->
                <div class="flex items-center gap-2">
                    <!-- Scroll Mode Toggle -->
                    <button @click.stop="comicViewer.scrollMode = (comicViewer.scrollMode === 'page' ? 'continuous' : 'page')"
                        class="p-2 text-slate-300 hover:text-white bg-white/5 hover:bg-white/15 border border-white/10 rounded-xl transition-all duration-200"
                        :title="comicViewer.scrollMode === 'page' ? t('scroll_continuous') : t('scroll_page')">
                        <i class="fa-solid" :class="comicViewer.scrollMode === 'page' ? 'fa-scroll' : 'fa-file-lines'"></i>
                    </button>

                    <!-- Auto scroll play/pause -->
                    <button x-show="comicViewer.scrollMode === 'continuous'" @click.stop="toggleComicAutoScroll()"
                        class="p-2 border rounded-xl transition-all duration-200"
                        :class="comicViewer.autoScrollActive ? 'text-emerald-400 bg-emerald-500/10 hover:bg-emerald-500/20 border-emerald-500/25' : 'text-slate-300 hover:text-white bg-white/5 hover:bg-white/15 border-white/10'"
                        :title="comicViewer.autoScrollActive ? t('comic_auto_scroll_stop') : t('comic_auto_scroll_start')">
                        <i class="fa-solid text-sm" :class="comicViewer.autoScrollActive ? 'fa-pause' : 'fa-play'"></i>
                    </button>

                    <!-- Fit Mode Toggle -->
                    <button @click.stop="comicViewer.fitMode = (comicViewer.fitMode === 'height' ? 'width' : 'height')"
                        class="p-2 text-slate-300 hover:text-white bg-white/5 hover:bg-white/15 border border-white/10 rounded-xl transition-all duration-200"
                        :title="comicViewer.fitMode === 'height' ? t('fit_width') : t('fit_height')">
                        <i class="fa-solid"
                            :class="comicViewer.fitMode === 'height' ? 'fa-arrows-left-right' : 'fa-arrows-up-down'"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Main Comic Canvas Area -->
        <div class="relative flex-1 flex items-center justify-center overflow-auto p-4 hide-scrollbar">
            <!-- Spinner / Page Loader -->
            <div x-show="comicViewer.loading || (comicViewer.scrollMode === 'page' && comicViewer.pageLoading)" x-cloak
                class="absolute inset-0 flex flex-col items-center justify-center gap-3 bg-slate-950/70 z-10 backdrop-blur-sm">
                <div class="w-12 h-12 rounded-full border-4 border-violet-500/20 border-t-violet-500 animate-spin">
                </div>
                <p class="text-xs text-slate-400 font-bold uppercase tracking-widest" x-text="t('loading')"></p>
            </div>

            <!-- Page-by-Page View -->
            <div x-show="comicViewer.scrollMode === 'page'"
                class="w-full h-full flex items-center justify-center relative select-none"
                :class="comicViewer.zoomActive ? 'overflow-auto cursor-grab' : 'overflow-hidden'"
                @touchstart="handleComicTouchStart($event)"
                @touchend="handleComicTouchEnd($event)">

                <!-- Navigation buttons (Desktop only, absolute float, only when not zoomed) -->
                <button x-show="!comicViewer.zoomActive"
                    class="hidden md:flex absolute left-6 top-1/2 -translate-y-1/2 z-20 items-center justify-center w-12 h-12 rounded-full border border-white/10 bg-slate-950/60 hover:bg-violet-600 hover:border-violet-500 text-white shadow-2xl transition-all duration-300 transform hover:scale-110 active:scale-95"
                    @click.stop="comicViewer.direction === 'rtl' ? nextComicPage() : prevComicPage()"
                    title="Previous Page">
                    <i class="fa-solid fa-chevron-left text-lg"></i>
                </button>
                <button x-show="!comicViewer.zoomActive"
                    class="hidden md:flex absolute right-6 top-1/2 -translate-y-1/2 z-20 items-center justify-center w-12 h-12 rounded-full border border-white/10 bg-slate-950/60 hover:bg-violet-600 hover:border-violet-500 text-white shadow-2xl transition-all duration-300 transform hover:scale-110 active:scale-95"
                    @click.stop="comicViewer.direction === 'rtl' ? prevComicPage() : nextComicPage()"
                    title="Next Page">
                    <i class="fa-solid fa-chevron-right text-lg"></i>
                </button>
                
                <!-- Page Images Container -->
                <div class="flex items-center justify-center gap-2 sm:gap-4 min-h-0 min-w-0 max-w-full max-h-full z-0 transition-transform duration-300"
                    :class="[
                        comicViewer.direction === 'rtl' ? 'flex-row-reverse' : 'flex-row',
                        comicViewer.zoomActive ? 'scale-[2.0] origin-center cursor-grab' : ''
                    ]">
                    <template x-for="idx in getComicPagesToRender()" :key="idx">
                        <img class="select-none shadow-2xl rounded-sm transition-all duration-300 object-contain"
                            :style="'filter: ' + getComicFilterStyle()"
                            :class="[
                                comicViewer.fitMode === 'height' ? (comicViewer.viewMode === 'single' ? 'max-h-[82vh] max-w-full' : 'max-h-[82vh] max-w-[48vw]') : (comicViewer.viewMode === 'single' ? 'w-full max-w-3xl' : 'w-[48vw] max-w-xl'),
                                comicViewer.pageLoading ? 'opacity-0' : 'opacity-100'
                            ]"
                            :src="comicViewer.pageUrls[idx]"
                            alt="Comic Page"
                            draggable="false"
                            @dblclick="toggleComicZoom($event)"
                            @load="comicViewer.pageLoading = false"
                            @error="comicViewer.pageLoading = false; if (comicViewer.file) showToast(t('err_loading_comic'), 'error')">
                    </template>
                </div>

                <!-- Invisible Page zones for pagination (touch friendly, desktop mouse friendly - only when not zoomed) -->
                <div x-show="!comicViewer.zoomActive" class="absolute inset-y-0 left-0 w-1/4 z-10 cursor-west-resize" 
                    @click="comicViewer.direction === 'rtl' ? nextComicPage() : prevComicPage()">
                </div>
                <div x-show="!comicViewer.zoomActive" class="absolute inset-y-0 right-0 w-1/4 z-10 cursor-east-resize" 
                    @click="comicViewer.direction === 'rtl' ? prevComicPage() : nextComicPage()">
                </div>
            </div>

            <!-- Continuous Scroll View -->
            <div id="share-folder-comic-continuous-container" x-show="comicViewer.scrollMode === 'continuous'"
                class="w-full h-full flex flex-col items-center gap-0 overflow-y-auto py-4 z-0 select-none hide-scrollbar">
                <template x-for="(pageUrl, index) in comicViewer.pageUrls" :key="index">
                    <div class="comic-page-wrapper flex flex-col items-center w-full relative" :data-index="index"
                        :class="comicViewer.fitMode === 'height' ? 'max-h-[90vh]' : 'w-full max-w-3xl mx-auto'">
                        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 3 4'%3E%3C/svg%3E"
                            :data-src="pageUrl" x-init="registerComicLazyImage($el)"
                            :style="'filter: ' + getComicFilterStyle()"
                            class="object-contain max-w-full opacity-0 transition-opacity duration-500"
                            :class="comicViewer.fitMode === 'height' ? 'max-h-[90vh]' : 'w-full max-w-3xl'"
                            alt="Comic Page" draggable="false"
                            @error="if (comicViewer.file) showToast(t('err_loading_comic'), 'error')">
                    </div>
                </template>
            </div>
        </div>
    </div>


    <!-- ==================== EPUB READER MODAL ==================== -->
    <div x-show="epubViewer.show" x-cloak
        :style="getEpubThemeStyles()"
        class="fixed inset-0 z-[600] flex flex-col select-none transition-colors duration-300"
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0 scale-95"
        x-transition:enter-end="opacity-100 scale-100"
        x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100 scale-100"
        x-transition:leave-end="opacity-0 scale-95"
        @keyup.window.right="nextEpubPage()"
        @keyup.window.left="prevEpubPage()"
        @keydown.window.down="if (epubViewer.show) { $event.preventDefault(); const iframe = document.querySelector('#epub-viewer-area iframe'); if (iframe && iframe.contentWindow) { iframe.contentWindow.scrollBy({ top: 100, behavior: 'smooth' }); } }"
        @keydown.window.up="if (epubViewer.show) { $event.preventDefault(); const iframe = document.querySelector('#epub-viewer-area iframe'); if (iframe && iframe.contentWindow) { iframe.contentWindow.scrollBy({ top: -100, behavior: 'smooth' }); } }"
        @keyup.window.escape="epubViewer.show && closeEpubViewer()">

        <style>
            .epub-btn:hover {
                background-color: var(--epub-hover-bg) !important;
            }
            .epub-toc-btn {
                color: var(--epub-fg) !important;
                opacity: 0.85;
            }
            .epub-toc-btn:hover {
                background-color: var(--epub-hover-bg) !important;
                opacity: 1;
                border-color: var(--epub-border) !important;
            }
        </style>

        <!-- Top Header Panel -->
        <header :style="'background-color: var(--epub-header-bg); border-color: var(--epub-border); color: var(--epub-fg);'"
            class="relative z-30 flex items-center justify-between p-4 backdrop-blur-md border-b shadow-sm gap-4">
            <div class="flex items-center gap-3 min-w-0">
                <button @click="epubViewer.sidebarOpen = !epubViewer.sidebarOpen"
                    class="p-2 rounded-xl transition-all duration-200 epub-btn"
                    :style="'color: var(--epub-fg);'"
                    title="Table of Contents">
                    <i class="fa-solid fa-list-ol text-lg"></i>
                </button>
