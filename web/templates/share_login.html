<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{{ .filename }} - TeleCloud Share</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/static/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="/static/css/tailwind.css?v={{ .version }}">

    <link rel="stylesheet" href="/static/css/style.min.css?v={{ .version }}">

    <script>window.TELECLOUD_VERSION = '{{ .version }}';</script>
    <script src="/static/js/common.min.js?v={{ .version }}"></script>
    <script type="module" src="/static/js/script.min.js?v={{ .version }}"></script>

    <script>
        if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
    </script>

    <!-- SEO & Social Meta Tags -->
    <meta name="description" content="Protected Content: {{ .filename }}">
    <meta property="og:title" content="{{ .filename }} - TeleCloud Share">
    <meta property="og:description" content="This content is protected by a password. Please enter the password to access.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/static/favicon.ico">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{ .filename }} - TeleCloud Share">
    <meta name="twitter:description" content="This content is protected by a password. Please enter the password to access.">
    <style>
        [x-cloak] {
            display: none !important;
        }

        .bg-yellow-brand {
            background-color: #d97706 !important;
        }

        /* amber-600 */
        .bg-yellow-brand:hover {
            background-color: #f59e0b !important;
        }

        /* amber-500 */
        .text-yellow-brand {
            color: #d97706 !important;
        }

        .border-yellow-brand {
            border-color: #d97706 !important;
        }

        .shadow-yellow-brand {
            box-shadow: 0 10px 15px -3px rgba(217, 119, 6, 0.3) !important;
        }

        .loader-bar {
            width: 150px;
            height: 4px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .dark .loader-bar {
            background: rgba(255, 255, 255, 0.1);
        }

        .loader-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 50%;
            background: #d97706;
            animation: loading 1.5s infinite ease-in-out;
        }

        @keyframes loading {
            0% {
                left: -50%;
            }

            100% {
                left: 100%;
            }
        }
    </style>
</head>

<body
    class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 h-full relative overflow-hidden flex flex-col transition-colors duration-500"
    x-data="shareLogin('{{ .token }}', '{{ .filename }}')" x-init="init()">

    <!-- Loading overlay - strictly controlled -->
    <div x-show="!ready" x-transition:leave="transition ease-in duration-500" x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
        class="fixed inset-0 bg-slate-50 dark:bg-slate-950 flex flex-col items-center justify-center z-[9999]">
        <div class="relative mb-8 animate-pulse">
            <div class="w-16 h-16 bg-yellow-brand rounded-2xl flex items-center justify-center shadow-2xl rotate-12">
                <i class="fa-solid fa-lock text-3xl text-white -rotate-12"></i>
            </div>
        </div>
        <div class="loader-bar mb-4"></div>
        <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400 dark:text-slate-500">TeleCloud
            Security</p>
    </div>

    <div x-show="ready" x-cloak x-transition:enter="transition ease-out duration-700 delay-300"
        x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0"
        class="flex-1 w-full h-full flex flex-col items-center justify-center relative p-4">

        <div class="blob-1"></div>
        <div class="blob-2"></div>

        <div class="glass-panel p-8 md:p-10 rounded-[2rem] w-full max-w-md relative shadow-2xl border border-white/10">
            <!-- Language Dropdown -->
            <div class="absolute top-4 right-4 z-[110]" x-data="{ open: false }">
                <button @click="open = !open" @click.outside="open = false"
                    class="h-8 px-2 flex items-center gap-1.5 text-slate-500 hover:text-blue-500 bg-white/50 dark:bg-slate-800/50 rounded-lg transition-colors border border-slate-200 dark:border-slate-700/50">
                    <i class="fa-solid fa-earth-americas text-xs"></i>
                    <span class="text-[10px] font-bold uppercase" x-text="lang"></span>
                </button>
                <div x-show="open" x-cloak
                    class="absolute top-10 right-0 w-32 glass-menu rounded-xl shadow-xl border border-white/20 p-1 z-[1000]"
                    x-transition:enter="transition ease-out duration-100"
                    x-transition:enter-start="transform opacity-0 scale-95"
                    x-transition:enter-end="transform opacity-100 scale-100">
                    <template x-for="l in TeleCloud.availableLangs" :key="l.code">
                        <button @click="setLang(l.code); open = false"
                            class="w-full text-left px-3 py-2 rounded-lg text-xs font-medium transition-colors flex items-center justify-between"
                            :class="lang === l.code ? 'bg-blue-600 text-white shadow-md' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800'">
                            <span x-text="l.name"></span>
                            <span x-text="l.flag"></span>
                        </button>
                    </template>
                </div>
            </div>

            <div class="text-center mb-8">
                <div
                    class="w-16 h-16 bg-yellow-brand rounded-2xl mx-auto flex items-center justify-center shadow-lg mb-4 transform hover:scale-110 transition-transform duration-500">
                    <i class="fa-solid fa-lock text-3xl text-white drop-shadow-md"></i>
                </div>
                <h2 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white"
                    x-text="t('protected_content')"></h2>
                <p class="text-xs text-slate-500 dark:text-slate-400 mt-2 leading-relaxed">
                    <span x-text="t('share_password_msg')"></span><br>
                    <strong class="text-blue-600 dark:text-blue-400 text-sm mt-1 inline-block"
                        x-text="filename"></strong>
                </p>
            </div>

            <form @submit.prevent="verify" class="space-y-4">
                <div class="relative group">
                    <input type="password" x-model="password" :placeholder="t('access_code')" required
                        class="w-full p-4 rounded-xl bg-white/50 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-700/50 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-900 dark:text-white backdrop-blur-sm transition-all shadow-inner"
                        :class="error ? 'border-red-500 focus:ring-red-500' : ''">
                </div>

                <div x-show="error" x-transition
                    class="flex items-center gap-2 text-red-500 text-[11px] font-bold bg-red-50 dark:bg-red-500/10 p-3 rounded-xl animate-shake">
                    <i class="fa-solid fa-circle-exclamation text-xs"></i>
                    <span x-text="error"></span>
                </div>

                <button type="submit"
                    class="w-full py-4 rounded-xl bg-yellow-brand text-white font-semibold transition-all shadow-lg active:scale-[0.98] flex justify-center items-center gap-2"
                    :disabled="loading">
                    <i class="fa-solid fa-spinner fa-spin" x-show="loading" x-cloak></i>
                    <i class="fa-solid fa-unlock" x-show="!loading"></i>
                    <span x-text="t('unlock_now')"></span>
                </button>
            </form>

            <p
                class="text-center text-[10px] text-slate-400 dark:text-slate-500 mt-4 flex items-center justify-center gap-1.5 font-bold uppercase tracking-wider">
                <i class="fa-solid fa-shield-halved text-emerald-500 text-sm"></i>
                <span>Secured by TeleCloud OS</span>
            </p>

            <footer
                class="mt-8 pt-6 border-t border-slate-200 dark:border-slate-800/50 text-center relative z-10 opacity-60 hover:opacity-100 transition-opacity">
                <div class="flex items-center justify-center gap-4 mb-2">
                    <a href="https://github.com/dabeecao/telecloud-go" target="_blank"
                        class="text-slate-500 hover:text-blue-500 transition-colors">
                        <i class="fa-brands fa-github text-lg"></i>
                    </a>
                </div>
                <p class="text-xs text-slate-500 dark:text-slate-400 font-medium">Powered by <span
                        class="font-bold text-blue-500">TeleCloud OS</span> &copy; 2026 <span
                        class="text-blue-600 dark:text-blue-400">@dabeecao</span></p>
            </footer>
        </div>
    </div>

    <script>
        function shareLogin(token, filename) {
            return {
                token: token,
                filename: filename,
                password: '',
                loading: false,
                error: '',
                lang: TeleCloud.lang || 'en',
                ready: false,

                init() {
                    TeleCloud.initTheme('system');
                    const checkReady = () => {
                        // Strictly check if translations for the current language are available
                        if (TeleCloud.translations[this.lang] || (TeleCloud.translationsLoaded && TeleCloud.translations[TeleCloud.lang])) {
                            if (TeleCloud.translations[TeleCloud.lang]) {
                                this.lang = TeleCloud.lang;
                            }
                            // Small delay to ensure Alpine has bound everything and evaluated t() calls
                            this.$nextTick(() => {
                                setTimeout(() => { this.ready = true; }, 100);
                            });
                        }
                    };

                    window.addEventListener('tc-translations-loaded', (e) => {
                        // Pattern from share.html: reset lang to force re-evaluation of all t() calls
                        this.lang = '';
                        this.$nextTick(() => {
                            this.lang = e.detail.lang;
                            checkReady();
                        });
                    });

                    // If already loaded, trigger check
                    if (TeleCloud.translationsLoaded) {
                        checkReady();
                    }
                },

                t(key, params) { return TeleCloud.t(key, params, this.lang); },

                async setLang(code) {
                    this.loading = true;
                    await TeleCloud.setLang(code);
                    this.lang = code;
                    this.loading = false;
                },

                verify() {
                    if (this.loading) return;
                    this.loading = true;
                    this.error = '';
                    const formData = new FormData();
                    formData.append('password', this.password);
                    fetch(`/s/${this.token}/verify`, { method: 'POST', body: formData })
                        .then(async res => {
                            const data = await res.json();
                            if (res.ok && data.status === 'ok') { window.location.reload(); }
                            else { this.error = data.error === 'incorrect_password' ? this.t('toast_login_fail') : this.t('error'); }
                        })
                        .catch(() => { this.error = this.t('conn_error'); })
                        .finally(() => { this.loading = false; });
                }
            }
        }
    </script>
</body>

</html>
